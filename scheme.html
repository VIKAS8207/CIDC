<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Courts | CIDC Raipur Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA]">

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B365D',
                        brandDark: '#0B111D',
                        brandBlue: '#0066FF',
                        accentRed: '#B22234',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    }
                },
            },
        }
    </script>

 <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html"},
        { name: "About Us", href: "about.html" },
        { name: "Account", href: "account.html", active: true  },
        { name: "RTI", href: "rti.html" },
        { name: "Tender", href: "tender.html" },
        { name: "Vendor & Shop", href: "shop.html" },
        { name: "EPFO", href: "EPFO.html" },
        { name: "To-Do", href: "todo.html" },
        { name: "Contact Us", href: "getin.html" },
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="/image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6">
              <div className="flex justify-between items-center mb-8">
                <span className="font-bold text-gray-400">MENU</span>
                <button onClick={() => setIsMenuOpen(false)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              <nav className="flex flex-col space-y-4">
                {navLinks.map((link) => (
                  <a key={link.name} className={`text-lg font-semibold py-2 border-b border-gray-50 ${link.active ? "text-[#B22234]" : "text-gray-800"}`} href={link.href}>{link.name}</a>
                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }
 function ProjectsAndSchemes() {
  const containerStyle = { maxWidth: '1500px' };

  return (
    <section className="bg-white py-24 px-6 font-sans border-t border-zinc-200">
      <div style={containerStyle} className="mx-auto">
        
        {/* CIDC INDUSTRIAL HEADER */}
        <div className="mb-20">
          <div className="flex items-center gap-4 mb-4">
            <div className="w-12 h-1 bg-[#B22234]"></div>
            <span className="text-[#B22234] font-black text-[10px] uppercase tracking-[0.3em]">Institutional Dashboard</span>
          </div>
          <h1 className="text-4xl md:text-5xl font-black text-zinc-900 uppercase tracking-tighter leading-none mb-4">
            Projects & <span className="text-[#B22234]">Schemes</span>
          </h1>
          <p className="text-zinc-500 text-sm font-medium italic border-l border-zinc-200 pl-6">
            Construction Industry Development Council | Regional Center, Raipur
          </p>
        </div>
{/* TOP STATS - SLIM MINIMAL GRID */}
<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-0 border-y border-zinc-200 mb-20 bg-white">
  {[
    { label: "Total Schemes", val: "42", sub: "FY 2026-B1" },
    { label: "Active Projects", val: "18", sub: "OPERATIONAL" },
    { label: "Total Investment", val: "₹12.4Cr", sub: "CAPITAL" },
    { label: "Beneficiaries", val: "1,240+", sub: "SOCIAL" },
  ].map((stat, i) => (
    <div 
      key={i} 
      className="p-12 flex flex-col items-center justify-center text-center border-r border-zinc-100 last:border-r-0 md:border-b-0 border-b group hover:bg-zinc-50 transition-all duration-500 h-56"
    >
      {/* Sub-label: Ultra-thin tracking */}
      <span className="text-[9px] font-black text-zinc-400 uppercase tracking-[0.4em] mb-6 group-hover:text-[#B22234] transition-colors">
        {stat.sub}
      </span>
      
      {/* Value: Large Industrial Manrope */}
      <h3 className="text-5xl font-black text-zinc-900 tracking-tighter mb-4">
        {stat.val}
      </h3>
      
      {/* Label: Bold and Balanced */}
      <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest leading-none mb-6">
        {stat.label}
      </p>

      {/* CIDC Minimal Accent: Slim 1px line */}
      <div className="w-8 h-px bg-zinc-200 group-hover:w-16 group-hover:bg-[#B22234] transition-all duration-500"></div>
    </div>
  ))}
</div>

        {/* MAIN CONTENT GRID */}
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
          
          {/* LEFT: TABLES & COMPLETED (lg:col-span-8) */}
          <div className="lg:col-span-8 space-y-20">
            
            {/* ONGOING PROJECTS REGISTRY */}
<div>
  {/* Header with CIDC Slim Line */}
  <div className="flex justify-between items-end mb-10">
    <div>
      <div className="flex items-center gap-3 mb-3">
        <div className="w-10 h-0.5 bg-[#B22234]"></div>
        <span className="text-[#B22234] font-black text-[9px] uppercase tracking-[0.3em]">Infrastructure Ledger</span>
      </div>
      <h2 className="text-3xl font-black uppercase tracking-tighter text-zinc-900">Project <span className="text-[#B22234]">Registry</span></h2>
    </div>
    <button className="text-[#B22234] text-[10px] font-black uppercase tracking-widest border-b border-[#B22234] pb-1 hover:text-zinc-900 hover:border-zinc-900 transition-all">
      Access Archive →
    </button>
  </div>

{/* CIDC Industrial Table Style */}
  <div className="border-t-2 border-zinc-900">
    {/* Registry Header */}
    <div className="hidden md:grid grid-cols-12 gap-0 bg-zinc-50 border-b border-zinc-200">
      <div className="col-span-5 px-6 py-3 text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400 border-r border-zinc-100">Project Details & Reference</div>
      <div className="col-span-2 px-6 py-3 text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400 border-r border-zinc-100 text-center">Status</div>
      <div className="col-span-3 px-6 py-3 text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400 border-r border-zinc-100 text-right">Deployment Timeline</div>
      <div className="col-span-2 px-6 py-3 text-[9px] font-black uppercase tracking-[0.2em] text-zinc-400 text-right">Archive</div>
    </div>

    {/* Registry Rows */}
    <div className="divide-y divide-zinc-100">
      {[
        { name: "Skill Training Center - Korba", id: "PRJ-KOB-04", status: "IN PROGRESS", date: "DEC 2026", active: false },
        { name: "Smart Highway Amenities (NH-30)", id: "PRJ-NH-30", status: "ACTIVE", date: "AUG 2027", active: true },
        { name: "IT Park Expansion - Naya Raipur", id: "PRJ-NR-09", status: "IN PROGRESS", date: "JAN 2028", active: false }
      ].map((row, i) => (
        <div key={i} className="grid grid-cols-1 md:grid-cols-12 gap-0 items-center group hover:bg-zinc-50 transition-colors">
          
          {/* Column 1: Identity & Accent */}
          <div className="col-span-5 px-6 py-5 border-r border-zinc-100 flex items-center gap-5">
            {/* Status Accent Bar */}
            <div className={`w-1 h-6 transition-all duration-300 ${row.active ? 'bg-[#B22234]' : 'bg-zinc-300 group-hover:bg-zinc-900'}`}></div>
            <div>
              <p className="text-[14px] font-bold text-zinc-900 uppercase tracking-tight leading-none mb-1 group-hover:text-[#B22234] transition-colors">
                {row.name}
              </p>
              <p className="text-[9px] font-black text-zinc-400 tracking-[0.2em] uppercase">{row.id}</p>
            </div>
          </div>

          {/* Column 2: Status Label */}
          <div className="col-span-2 px-6 py-5 border-r border-zinc-100 text-center">
            <span className={`text-[10px] font-black uppercase tracking-widest ${row.active ? 'text-[#B22234]' : 'text-zinc-400'}`}>
              {row.active ? '● Active' : '○ In Progress'}
            </span>
          </div>

          {/* Column 3: Timeline */}
          <div className="col-span-3 px-6 py-5 border-r border-zinc-100 text-right">
            <span className="text-[11px] font-black text-zinc-400 group-hover:text-zinc-900 transition-colors tracking-widest">
              {row.date}
            </span>
          </div>

          {/* Column 4: Document Download */}
          <div className="col-span-2 px-6 py-5 text-right">
            <button className="text-[9px] font-black uppercase tracking-widest text-zinc-300 group-hover:text-[#B22234] transition-all flex items-center justify-end gap-2 ml-auto">
              <span>Download</span>
              <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                <path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </button>
          </div>
        </div>
      ))}
    </div>
    
    {/* Table Footer Border */}
    <div className="border-t border-zinc-900"></div>
  </div>
</div>

            {/* COMPLETED PROJECTS - SHARP BOXES */}
            <div>
              <h2 className="text-2xl font-black uppercase tracking-tighter text-zinc-900 mb-8">Completed Operations</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-0 border-t border-l border-zinc-200">
                {[
                  { name: "Rajnandgaon Hub", desc: "Multi-purpose construction training facility for rural youth." },
                  { name: "Jagdalpur Unit", desc: "Modern vocational center established for Bastar division." },
                  { name: "Bridge Audit '23", desc: "Full structural safety certification of 14 key bridges." }
                ].map((item, i) => (
                  <div key={i} className="bg-zinc-50 p-8 border-r border-b border-zinc-200 group transition-all">
                    <div className="w-8 h-1 bg-[#B22234] mb-6 group-hover:w-full transition-all"></div>
                    <h4 className="font-black text-zinc-900 uppercase tracking-tight mb-4">{item.name}</h4>
                    <p className="text-[11px] text-zinc-500 font-medium leading-relaxed">{item.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* RIGHT: UPCOMING SCHEMES - NOTICES STYLE (lg:col-span-4) */}
          <div className="lg:col-span-4 bg-zinc-900 p-12 text-white relative shadow-2xl">
            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 -mr-16 -mt-16 rotate-45 pointer-events-none"></div>
            <h2 className="text-[11px] font-black text-[#B22234] uppercase tracking-[0.4em] mb-12">Upcoming Schemes</h2>
            
            <div className="space-y-12 relative">
              <div className="absolute left-[3px] top-1 bottom-1 w-px bg-white/10"></div>
              {[
                { label: "LAUNCH Q3", title: "E-Worker Portal 2.0", desc: "Direct benefit transfer system for verified laborers." },
                { label: "TENDER OPEN", title: "Green Building Lab", desc: "Materials testing facility for sustainable technology." },
                { label: "PLANNING", title: "Urban Skilling 2027", desc: "Integrated training for urban ULB departments." }
              ].map((sch, i) => (
                <div key={i} className="pl-8 relative group cursor-pointer">
                  <div className="absolute left-[-1px] top-1.5 w-1 h-8 bg-[#B22234] opacity-0 group-hover:opacity-100 transition-all"></div>
                  <p className="text-[9px] font-black text-zinc-500 tracking-widest mb-2">{sch.label}</p>
                  <h4 className="font-bold text-white uppercase tracking-tight text-sm mb-2 group-hover:text-[#B22234] transition-colors">{sch.title}</h4>
                  <p className="text-[11px] text-zinc-400 font-medium leading-snug">{sch.desc}</p>
                </div>
              ))}
              
              <div className="mt-12 border border-white/10 p-1">
                <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=600&q=80" className="w-full h-48 object-cover grayscale" alt="Construction" />
              </div>
            </div>
          </div>
        </div>

        {/* BOTTOM: SCHEME DIRECTORY - REGISTRY STYLE */}
       
        
      </div>
    </section>
  );
}

 function SchemeDirectory() {
  const [expandedId, setExpandedId] = React.useState(null);

  const schemes = [
   { 
  id: 0,
  name: "Parivahan Scheme 2026", 
  tag: "WELFARE", 
  progress: 85,
  desc: "Details of Employees Status as of 01.03.2026. Total employees: 2,943 (2,738 from 2003 partition + 205 court reinstated). Remaining: 238 (224 on deputation, 14 in CIDC) after 1,376 VRS, 1,171 retired/deceased, and 158 absorbed."
},
    { 
      id: 1,
      name: "Mukhya Mantri Nirman Shramik Pension", 
      tag: "SOCIAL SECURITY", 
      progress: 42,
      desc: "A statutory pension framework designed specifically for registered construction workers above the age of 60. This scheme ensures long-term financial stability and dignity for the labor force that has contributed to the state's urban and rural infrastructure development."
    },
    { 
      id: 2,
      name: "State Apprenticeship Promotion", 
      tag: "SKILLS", 
      progress: 100,
      desc: "Direct coordination between CIDC and industrial partners to provide high-level on-site technical training. The program focuses on civil engineering, BIM modeling, and high-tech equipment operation, ensuring all candidates meet certified state deployment protocols."
    }
  ];

  const containerStyle = { maxWidth: '1500px' };

  return (
    <section className="py-24 bg-white border-t border-zinc-200 font-sans">
      <div style={containerStyle} className="mx-auto px-10">
        
        {/* Header - Slim & Readable */}
        <div className="flex flex-col md:flex-row justify-between items-start mb-16 gap-10">
          <div className="max-w-xl">
            <div className="flex items-center gap-4 mb-4">
              <div className="w-12 h-px bg-zinc-400"></div>
              <span className="text-zinc-400 font-bold text-[10px] uppercase tracking-[0.4em]">Resource Registry</span>
            </div>
            <h2 className="text-4xl md:text-5xl font-black text-zinc-900 uppercase tracking-tighter leading-none">
              Scheme <span className="text-[#B22234]">Directory</span>
            </h2>
            <p className="text-zinc-500 text-sm mt-6 font-medium italic border-l-2 border-zinc-100 pl-6 leading-relaxed">
              Official repository of active welfare and developmental frameworks managed by CIDC Raipur.
            </p>
          </div>
          
          
        </div>

        {/* Accordion Registry */}
        <div className="border-t-2 border-zinc-900">
          {schemes.map((item) => (
            <div key={item.id} className="border-b border-zinc-100">
              {/* Row Header */}
              <div 
                onClick={() => setExpandedId(expandedId === item.id ? null : item.id)}
                className="flex flex-col md:flex-row items-center justify-between py-10 px-6 cursor-pointer hover:bg-zinc-50 transition-all group"
              >
                <div className="flex items-center gap-8 w-full md:w-2/5">
                  <div className={`w-3 h-3 transition-all duration-500 ${expandedId === item.id ? 'bg-[#B22234] rotate-180' : 'bg-zinc-200 group-hover:bg-zinc-900'}`}></div>
                  <div>
                    <h3 className="font-bold text-zinc-900 uppercase tracking-tight text-xl leading-none mb-2 group-hover:text-[#B22234] transition-colors">
                      {item.name}
                    </h3>
                    <span className="text-[9px] font-black text-zinc-400 tracking-[0.3em]">{item.tag}</span>
                  </div>
                </div>
                
                {/* Status Section */}
                <div className="flex flex-1 items-center justify-end gap-16 w-full mt-6 md:mt-0">
                  <div className="w-full max-w-[240px]">
                    <div className="flex justify-between text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em] mb-3">
                      <span>Deployment Status</span>
                      <span className={item.progress === 100 ? 'text-green-600' : 'text-zinc-900'}>{item.progress}%</span>
                    </div>
                    <div className="h-1 w-full bg-zinc-100">
                      <div 
                        className={`h-full transition-all duration-700 ${item.progress === 100 ? 'bg-green-600' : 'bg-zinc-900 group-hover:bg-[#B22234]'}`} 
                        style={{ width: `${item.progress}%` }}
                      ></div>
                    </div>
                  </div>

                  {/* Toggle Toggle */}
                  <button 
                    className={`w-14 h-14 border flex items-center justify-center transition-all duration-300
                      ${expandedId === item.id ? 'bg-[#B22234] border-[#B22234] text-white shadow-lg' : 'bg-white border-zinc-200 text-zinc-400 group-hover:border-zinc-900'}`}
                  >
                    <svg 
                      className={`w-5 h-5 transition-transform duration-500 ${expandedId === item.id ? 'rotate-180' : 'rotate-0'}`} 
                      fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3"
                    >
                      <path d="M19 9l-7 7-7-7" />
                    </svg>
                  </button>
                </div>
              </div>

              {/* Expansion Content - Improved Readability */}
              <div 
                className={`overflow-hidden transition-all duration-700 ease-in-out bg-zinc-50
                  ${expandedId === item.id ? 'max-h-[600px] opacity-100' : 'max-h-0 opacity-0'}`}
              >
                <div className="p-16 border-t border-zinc-200 grid grid-cols-1 lg:grid-cols-12 gap-16">
                  {/* Info Sidebar */}
                  <div className="lg:col-span-3">
                    <h4 className="text-[11px] font-black text-[#B22234] uppercase tracking-[0.4em] mb-6">Dossier Overview</h4>
                    <div className="space-y-4">
                      <div>
                        <p className="text-[9px] font-black text-zinc-400 uppercase tracking-widest mb-1">Filing Reference</p>
                        <p className="text-xs font-bold text-zinc-900">CIDC-SCH-2026-0{item.id + 1}</p>
                      </div>
                      <div>
                        <p className="text-[9px] font-black text-zinc-400 uppercase tracking-widest mb-1">Status</p>
                        <p className="text-xs font-bold text-zinc-900">{item.progress === 100 ? 'FULLY DEPLOYED' : 'UNDER IMPLEMENTATION'}</p>
                      </div>
                    </div>
                  </div>

                  {/* Main Description Pane - Readability optimized */}
                  <div className="lg:col-span-9 max-w-3xl">
                    <p className="text-[15px] text-zinc-700 leading-relaxed font-medium tracking-wide">
                      {item.desc}
                    </p>
                    
                    <div className="mt-12 flex flex-wrap gap-4">
                      <button className="bg-zinc-900 text-white px-10 py-4 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-[#B22234] transition-all shadow-md">
                        Download Full PDF
                      </button>
                      
                    </div>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}
