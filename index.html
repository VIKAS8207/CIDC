<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html", active: true },
        { name: "About Us", href: "about.html" },
        { name: "Schemes", href: "scheme.html" },
        { name: "RTI", href: "#" },
        { name: "Tender", href: "#" },
        { name: "Vendor & Shop", href: "#" },
        { name: "Accounts", href: "#" },
        { name: "To-Do", href: "#" },
        { name: "Contact Us", href: "getin.html" },
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>

                </button>

                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }

 function Carousel() {
  const [currentSlide, setCurrentSlide] = useState(0);

  const slides = [
    {
      image: "/image/pic1.jpg", 
      
    },
    {
      image: "/image/pic2.avif", 
      
    },
    {
      image: "/image/pic3.jpg",
      
    }
  ];

  const nextSlide = () => {
    setCurrentSlide((prev) => (prev === slides.length - 1 ? 0 : prev + 1));
  };

  const prevSlide = () => {
    setCurrentSlide((prev) => (prev === 0 ? slides.length - 1 : prev - 1));
  };

  const containerStyle = { maxWidth: '1500px' };

  return (
    <section className="py-8 px-6">
      <div style={containerStyle} className="mx-auto relative group">
        
        <div className="relative h-[500px] w-full overflow-hidden">
          {slides.map((slide, index) => (
            <div
              key={index}
              className={`absolute inset-0 transition-opacity duration-700 ease-in-out ${
                index === currentSlide ? "opacity-100 z-10" : "opacity-0 z-0"
              }`}
            >
              <img
                src={slide.image}
                alt={slide.title}
                className="w-full h-full object-cover"
              />
              <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-12">
                <div className="max-w-2xl">
                   
                   <h2 className="text-white text-4xl font-black uppercase mb-2 tracking-tighter">
                     {slide.title}
                   </h2>
                   <p className="text-gray-300 text-sm max-w-md border-l-2 border-white/30 pl-4">
                     {slide.desc}
                   </p>
                </div>
              </div>
            </div>
          ))}
        </div>

        <button
          onClick={prevSlide}
          className="absolute left-0 top-1/2 -translate-y-1/2 z-20 bg-black/50 hover:bg-black text-white p-4 transition-all rounded-none border-r border-white/10"
          aria-label="Previous Slide"
        >
          <span className="text-2xl">←</span>
        </button>

        <button
          onClick={nextSlide}
          className="absolute right-0 top-1/2 -translate-y-1/2 z-20 bg-black/50 hover:bg-black text-white p-4 transition-all rounded-none border-l border-white/10"
          aria-label="Next Slide"
        >
          <span className="text-2xl">→</span>
        </button>

        <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex gap-3">
          {slides.map((_, index) => (
            <button
              key={index}
              onClick={() => setCurrentSlide(index)}
              className={`h-1 transition-all duration-300 rounded-none ${
                index === currentSlide ? "w-12 bg-red-600" : "w-6 bg-white/40 hover:bg-white"
              }`}
            />
          ))}
        </div>

      </div>
    </section>
  );
}

const RollingNumber = ({ value, trigger }) => {
  const [displayValue, setDisplayValue] = useState(0);
  const numericTarget = parseInt(value.replace(/[^\d]/g, ''), 10);
  const suffix = value.replace(/[\d]/g, '');

  useEffect(() => {
    // Only start calculation if trigger is true
    if (!trigger) return;

    let start = 0;
    const duration = 2000; // Smoother 2s animation for CIDC
    const increment = Math.ceil(numericTarget / (duration / 16));

    const timer = setInterval(() => {
      start += increment;
      if (start >= numericTarget) {
        setDisplayValue(numericTarget);
        clearInterval(timer);
      } else {
        setDisplayValue(start);
      }
    }, 16);

    return () => clearInterval(timer);
  }, [numericTarget, trigger]);

  return (
    <span>
      {displayValue.toLocaleString()}
      {suffix}
    </span>
  );
};

 function DashboardStats() {
  const [isVisible, setIsVisible] = useState(false);
  const sectionRef = useRef(null);

  const stats = [
    { val: "142", label: "Projects Managed" },
    { val: "890", label: "Active Schemes" },
    { val: "₹850cr", label: "Total Capital Outlay" },
    { val: "08", label: "Ongoing Tenders" }
  ];

  // Intersection Observer to trigger animation on scroll
  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setIsVisible(true);
          observer.unobserve(entry.target); // Trigger only once
        }
      },
      { threshold: 0.3 } // Triggers when 30% of section is visible
    );

    if (sectionRef.current) {
      observer.observe(sectionRef.current);
    }

    return () => observer.disconnect();
  }, []);

  const containerStyle = { maxWidth: '1500px' };

  return (
    <section 
      ref={sectionRef}
      className="py-24 px-6 border-y border-zinc-200"
    >
      <div 
        style={containerStyle} 
        className="mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-0"
      >
        {stats.map((s, i) => (
          <div 
            key={i} 
            className="p-12 flex flex-col items-center text-center border-r border-zinc-100 last:border-r-0 md:border-b-0 border-b last:border-b-0 group hover:bg-zinc-50 transition-colors duration-500"
          >
            {/* Label: Top aligned in CIDC Style */}
            <p className="text-[10px] font-black text-zinc-400 uppercase tracking-[0.4em] mb-4">
              {s.label}
            </p>

            {/* Number: Large, Industrial black */}
            <h2 className="text-5xl md:text-6xl font-black text-zinc-900 mb-6 tracking-tighter">
              <RollingNumber value={s.val} trigger={isVisible} />
            </h2>
            
            {/* CIDC Brand Accent: Centered */}
            <div className="w-10 h-1 bg-[#B22234] group-hover:w-20 transition-all duration-500"></div>
          </div>
        ))}
      </div>
    </section>
  );
}
