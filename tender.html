<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Courts | CIDC Raipur Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA]">

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B365D',
                        brandDark: '#0B111D',
                        brandBlue: '#0066FF',
                        accentRed: '#B22234',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    }
                },
            },
        }
    </script>

 <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html"},
        { name: "About Us", href: "about.html" },
        { name: "Schemes", href: "scheme.html" },
        { name: "RTI", href: "rti.html" },
        { name: "Tender", href: "tender.html" , active: true  },
        { name: "Vendor & Shop", href: "shop.html" },
        { name: "EPFO", href: "EPFO.html" },
        { name: "To-Do", href: "todo.html" },
        { name: "Contact Us", href: "getin.html" },
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="/image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6">
              <div className="flex justify-between items-center mb-8">
                <span className="font-bold text-gray-400">MENU</span>
                <button onClick={() => setIsMenuOpen(false)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              <nav className="flex flex-col space-y-4">
                {navLinks.map((link) => (
                  <a key={link.name} className={`text-lg font-semibold py-2 border-b border-gray-50 ${link.active ? "text-[#B22234]" : "text-gray-800"}`} href={link.href}>{link.name}</a>
                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }



        // --- CIDC Reusable Components ---

        const SectionHeader = ({ title, actionText }) => (
            <div className="flex justify-between items-end border-b-2 border-zinc-900 pb-4 mb-8">
                <div>
                    <div className="flex items-center gap-2 mb-2">
                        <div className="w-6 h-px bg-[#B22234]"></div>
                        <span className="text-[#B22234] text-[9px] font-black uppercase tracking-[0.4em]">Resource Archive</span>
                    </div>
                    <h2 className="text-2xl font-black text-zinc-900 uppercase tracking-tighter leading-none">{title}</h2>
                </div>
                {actionText && (
                    <button className="text-[10px] font-black text-zinc-400 uppercase tracking-widest hover:text-[#B22234] transition-colors">
                        {actionText} →
                    </button>
                )}
            </div>
        );

        const KPIBlock = ({ label, value, subtext, isPrimary }) => (
            <div className={`p-8 border border-zinc-200 flex flex-col justify-between h-44 ${isPrimary ? 'bg-[#B22234] text-white border-[#B22234]' : 'bg-white text-zinc-900'}`}>
                <div className="flex justify-between items-start">
                    <span className={`text-[9px] font-black uppercase tracking-[0.3em] ${isPrimary ? 'text-white/60' : 'text-zinc-400'}`}>System Metric</span>
                    <div className={`w-2 h-2 ${isPrimary ? 'bg-white' : 'bg-[#B22234]'}`}></div>
                </div>
                <div>
                    <h3 className="text-4xl font-black tracking-tighter leading-none mb-1">{value}</h3>
                    <p className={`text-[10px] font-black uppercase tracking-[0.2em] ${isPrimary ? 'text-white/80' : 'text-zinc-500'}`}>{label}</p>
                </div>
            </div>
        );

        // --- Main Page Component ---

        function ResourceDirectory() {
            const containerStyle = { maxWidth: '1500px' };

            const tenders = [
                { name: "Smart City Infrastructure Phase II", dept: "Construction & Development", ref: "CIDC/TEN/2026/WR1", date: "24 OCT 2026" },
                { name: "Public Information Display Systems", dept: "IT & Electronics", ref: "CIDC/TEN/2026/112", date: "02 NOV 2026" },
                { name: "Solar Power Installation for Govt Hubs", dept: "Renewable Energy", ref: "CIDC/TEN/2026/W15", date: "15 NOV 2026" }
            ];

            return (
                <div className="min-h-screen bg-white font-sans py-20 px-6">
                    <div style={containerStyle} className="mx-auto space-y-24">
                        
                        {/* 1. HERO SECTION */}
                        <section className="max-w-4xl">
                            <h1 className="text-6xl font-black text-zinc-900 uppercase tracking-tighter leading-[0.9] mb-8">
                                Resource Directory: <br />
                                <span className="text-[#B22234]">Policies, Rules & Documents</span>
                            </h1>
                            <p className="text-zinc-500 text-sm font-medium leading-relaxed border-l-4 border-zinc-900 pl-8 max-w-2xl">
                                Access critical institutional documents and regulatory frameworks. Our commitment to 
                                transparency ensures all tender and policy information is readily available for stakeholders.
                            </p>
                        </section>

                        {/* 2. KPI STRIP */}
                        <section className="grid grid-cols-1 md:grid-cols-3 gap-0 border-zinc-200">
                            <KPIBlock label="Active Tender Notices" value="12 Active" isPrimary={true} />
                            <KPIBlock label="Last Policy Update" value="24h ago" />
                            <KPIBlock label="GIGW Compliance" value="100%" />
                        </section>

                        {/* 3. ACTIVE TENDERS TABLE */}
                        <section>
                            <SectionHeader title="Active Tenders" actionText="View Archive" />
                            <div className="border border-zinc-200">
                                <div className="grid grid-cols-12 bg-zinc-50 p-6 border-b border-zinc-900">
                                    <div className="col-span-5 text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400">Tender Nomenclature</div>
                                    <div className="col-span-3 text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400">Ref Number</div>
                                    <div className="col-span-2 text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400">Closing Date</div>
                                    <div className="col-span-2 text-right text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400">Action</div>
                                </div>
                                {tenders.map((item, i) => (
                                    <div key={i} className="grid grid-cols-12 p-8 items-center border-b border-zinc-100 hover:bg-zinc-50 transition-all group">
                                        <div className="col-span-5">
                                            <h4 className="text-[13px] font-bold text-zinc-900 uppercase tracking-tight group-hover:text-[#B22234] transition-colors">{item.name}</h4>
                                            <p className="text-[10px] text-zinc-400 font-medium uppercase tracking-widest mt-1">{item.dept}</p>
                                        </div>
                                        <div className="col-span-3 font-mono text-[11px] text-zinc-500 font-bold">{item.ref}</div>
                                        <div className="col-span-2 text-[11px] font-black text-[#B22234]">{item.date}</div>
                                        <div className="col-span-2 text-right">
                                            <button className="bg-zinc-900 text-white px-6 py-3 text-[9px] font-black uppercase tracking-widest hover:bg-[#B22234] transition-all">Download PDF</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 4. FORMS & DOWNLOADS GRID */}
                        <section>
                            <SectionHeader title="Forms & Downloads" />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-0 border-t border-l border-zinc-200">
                                {['Vendor Registration', 'RTI Application', 'Grant Request'].map((form, i) => (
                                    <div key={i} className="p-12 border-r border-b border-zinc-200 bg-white flex flex-col justify-between h-72 group hover:bg-zinc-50 transition-all">
                                        <div>
                                            <span className="text-[10px] font-black text-zinc-300 uppercase tracking-widest mb-4 block">Form-0{i+1}</span>
                                            <h4 className="text-xl font-black text-zinc-900 uppercase tracking-tight mb-4">{form}</h4>
                                            <p className="text-[12px] text-zinc-500 font-medium leading-relaxed">Official institutional format for {form.toLowerCase()} processing.</p>
                                        </div>
                                        <button className="w-full border border-zinc-200 py-4 text-[9px] font-black uppercase tracking-[0.2em] group-hover:bg-zinc-900 group-hover:text-white transition-all">Download Form —</button>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 5. POLICIES & RULES - MONOLITH SPLIT */}
                        <section className="bg-zinc-950 p-12 lg:p-20 flex flex-col lg:flex-row gap-16 relative overflow-hidden">
                            {/* Technical Pattern Overlay */}
                            <div className="absolute right-0 bottom-0 opacity-10 pointer-events-none">
                                <svg className="w-64 h-64 rotate-12 translate-x-12 translate-y-12" fill="none" stroke="white" strokeWidth="1" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" /></svg>
                            </div>

                            <div className="flex-1 relative z-10">
                                <SectionHeader title={<span className="text-white">Transparency Policy</span>} />
                                <ul className="space-y-6 mt-10">
                                    {['Quarterly audit reports published openly.', 'Digital-first filing for all procurement.', 'Citizen grievance redressal within 15 days.'].map((text, i) => (
                                        <li key={i} className="flex items-start gap-4 text-zinc-400 text-sm font-medium">
                                            <div className="w-2 h-2 bg-[#B22234] mt-1.5 shrink-0"></div>
                                            {text}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="flex-1 space-y-10 relative z-10">
                                <div className="bg-white/5 border border-white/10 p-10 border-l-4 border-[#B22234]">
                                    <h5 className="text-[#B22234] font-black text-[10px] uppercase tracking-[0.4em] mb-4 text-center">Critical Notice</h5>
                                    <p className="text-white text-xs font-bold leading-relaxed uppercase tracking-wide">
                                        Vendors found providing false documentation will be blacklisted across all 
                                        state departments for a minimum period of 3 years.
                                    </p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button className="flex-1 bg-white text-zinc-900 py-5 font-black text-[10px] uppercase tracking-widest hover:bg-[#B22234] hover:text-white transition-all">Read Complete Charter</button>
                                    <button className="flex-1 border border-white/20 text-white py-5 font-black text-[10px] uppercase tracking-widest hover:bg-white hover:text-zinc-900 transition-all">Full Policy PDF</button>
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        }

function Footer (){
  const sectionTitle = "text-white font-bold text-lg mb-6 pb-2 border-b-2 border-[#B22234] inline-block";
  const linkStyle = "text-gray-400 hover:text-[#B22234] transition-colors duration-300 text-sm flex items-center gap-2";

  return (
    <footer className="bg-[#1a1a1a] text-white pt-16 pb-8">
      <div className="max-w-[1500px] mx-auto px-6">
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-12">
          
          <div className="space-y-4">
            <h3 className={sectionTitle}>CIDC Raipur</h3>
            <p className="text-gray-400 text-sm leading-relaxed">
              Chhattisgarh Infrastructure Development Corporation Ltd. is committed to 
              building sustainable and world-class infrastructure for the state of Chhattisgarh.
            </p>
            <div className="pt-4">
              <p className="text-xs text-gray-500 uppercase tracking-widest mb-2">Total Visitors</p>
              <span className="bg-gray-800 px-3 py-1 rounded text-[#B22234] font-mono font-bold tracking-tighter">
                012,458,792
              </span>
            </div>
          </div>

          <div>
            <h3 className={sectionTitle}>Quick Links</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Tenders & RFPs</a></li>
              <li><a href="#" className={linkStyle}>› Latest News</a></li>
              <li><a href="#" className={linkStyle}>› Recruitment</a></li>
              <li><a href="#" className={linkStyle}>› Photo Gallery</a></li>
              <li><a href="#" className={linkStyle}>› Important Documents</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Policy & Help</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Right to Information (RTI)</a></li>
              <li><a href="#" className={linkStyle}>› Terms & Conditions</a></li>
              <li><a href="#" className={linkStyle}>› Privacy Policy</a></li>
              <li><a href="#" className={linkStyle}>› Hyperlinking Policy</a></li>
              <li><a href="#" className={linkStyle}>› Copyright Policy</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Contact Us</h3>
            <div className="text-gray-400 text-sm space-y-4">
              <p>
                <strong>Address:</strong><br />
                First Floor, Shastri Chowk,<br /> 
                Raipur, Chhattisgarh - 492001
              </p>
              <p>
                <strong>Phone:</strong> +91-771-1234567
              </p>
              <p>
                <strong>Email:</strong> info@cidc.cg.gov.in
              </p>
            </div>
          </div>
        </div>

        <hr className="border-gray-800 mb-8" />

        <div className="flex flex-wrap items-center justify-center gap-12 mb-8 opacity-70 grayscale hover:grayscale-0 transition-all">
          <img src="/image/digital-india.png" alt="Digital India" className="h-10 object-contain" />
          <img src="/image/nic-logo.png" alt="National Informatics Centre" className="h-10 object-contain" />
          <img src="/image/mygov-logo.png" alt="MyGov" className="h-10 object-contain" />
          <img src="/image/india-gov-logo.png" alt="India.gov.in" className="h-10 object-contain" />
        </div>

        <div className="text-center space-y-4 pt-8 border-t border-gray-800">
          <p className="text-xs text-gray-500 leading-relaxed">
            Content Owned by Chhattisgarh Infrastructure Development Corporation Ltd. (CIDC) <br />
            © 2026 CIDC. All rights reserved. 
          </p>
          <p className="text-[10px] text-gray-600 uppercase tracking-widest">
            Developed and Hosted by <span className="text-gray-400">National Informatics Centre (NIC)</span>
          </p>
        </div>

      </div>
    </footer>
  );
};

  function FloatingNotice() {
  return (
    <a 
      href="notice.html" 
      className="fixed bottom-10 right-10 z-[100] flex items-center group font-sans"
    >
      {/* Label: Only visible on hover */}
      <span className=" z-[-1]  bg-[#B22234] text-white text-[12px] font-black uppercase tracking-[0.2em] px-8 py-4 pr-12 -mr-10 opacity-0 group-hover:opacity-100 transition-all duration-300">
        Notice
      </span>

      {/* Circle Button */}
      <div className="w-20 h-20 bg-[#B22234] text-white rounded-full flex items-center justify-center shadow-xl group-hover:bg-zinc-950 transition-colors duration-300">
        <svg 
          className="w-7 h-7" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2.5" 
          viewBox="0 0 24 24"
        >
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
    </a>
  );
}


        function Home() {
            return (
                <div className="antialiased font-sans">
                    <Navbar />
                    <main className="pt-40 min-h-screen px-6">
                      <ResourceDirectory />
                      <FloatingNotice />
                    </main>
                    <Footer />
                </div>
            );
        }

        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<Home />);
    </script>
</body>
</html>
