<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Courts | CIDC Raipur Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA]">

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B365D',
                        brandDark: '#0B111D',
                        brandBlue: '#0066FF',
                        accentRed: '#B22234',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    }
                },
            },
        }
    </script>

 <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html"},
        { name: "About Us", href: "about.html"},
        { name: "Schemes", href: "scheme.html" },
        { name: "RTI", href: "rti.html" },
        { name: "Tender", href: "#" },
        { name: "Vendor & Shop", href: "shop.html" },
        { name: "EPFO", href: "EPFO.html" },
        { name: "To-Do", href: "todo.html", active: true  },
        { name: "Contact Us", href: "getin.html" },
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6">
              <div className="flex justify-between items-center mb-8">
                <span className="font-bold text-gray-400">MENU</span>
                <button onClick={() => setIsMenuOpen(false)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              <nav className="flex flex-col space-y-4">
                {navLinks.map((link) => (
                  <a key={link.name} className={`text-lg font-semibold py-2 border-b border-gray-50 ${link.active ? "text-[#B22234]" : "text-gray-800"}`} href={link.href}>{link.name}</a>
                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }



  // --- SUB-COMPONENTS ---

  const StatBlock = ({ label, value, subtext }) => (
    <div className="bg-white border-l-4 border-zinc-900 p-8 flex flex-col justify-between h-36 hover:bg-zinc-50 transition-colors group">
      <div>
        <p className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-400 group-hover:text-[#B22234]">
          {label}
        </p>
        <h3 className="text-4xl font-black text-zinc-900 mt-2 uppercase tracking-tighter">{value}</h3>
      </div>
      <p className="text-[11px] font-bold text-zinc-400 uppercase tracking-widest">{subtext}</p>
    </div>
  );

  // --- MAIN DASHBOARD ---

  function PlanningDashboard() {
    const containerStyle = { maxWidth: '1500px' };

    const [tasks, setTasks] = useState([
      { id: 1024, name: "Smart City Integration Framework", dept: "Engineering", date: "Dec 15, 2024", status: "In Progress" },
      { id: 1025, name: "Q3 Budget Reconciliation", dept: "Finance", date: "Dec 30, 2024", status: "Pending" },
      { id: 1026, name: "Staff Capacity Building Phase 2", dept: "Admin", date: "Oct 22, 2024", status: "Completed" },
      { id: 1027, name: "Infrastructure Resilience Audit", dept: "Engineering", date: "Jan 12, 2025", status: "In Progress" }
    ]);

    const [showAddForm, setShowAddForm] = useState(false);
    const [newTask, setNewTask] = useState({ name: '', dept: 'Engineering', date: '', status: 'Pending' });

    const handleAddTask = () => {
      if (!newTask.name) return;
      const id = Math.floor(Math.random() * 9000) + 1000;
      setTasks([{ ...newTask, id }, ...tasks]);
      setNewTask({ name: '', dept: 'Engineering', date: '', status: 'Pending' });
      setShowAddForm(false);
    };

    const purgeTask = (id) => {
      if(confirm("CONFIRM TASK REMOVAL FROM REGISTRY?")) {
        setTasks(tasks.filter(t => t.id !== id));
      }
    };

    return (
      <main className="min-h-screen bg-white py-20 font-sans antialiased">
        <div style={containerStyle} className="mx-auto px-8 space-y-20">


          
          {/* HEADER SECTION */}
          <section className="flex justify-between items-end border-b border-gray-100 pb-12">
            <div>
              <h1 className="text-5xl font-black text-zinc-900 uppercase tracking-tighter leading-none">
                FY 2024-25 <span className="text-[#B22234]">Roadmap</span>
              </h1>
              <p className="text-[10px] font-black text-[#B22234] uppercase tracking-[0.4em] mt-4">
                Institutional Planning & Budgetary Governance
              </p>
            </div>
            <button 
              onClick={() => setShowAddForm(!showAddForm)}
              className="bg-zinc-900 text-white px-10 py-5 font-black text-[11px] uppercase tracking-[0.3em] hover:bg-[#B22234] transition-all"
            >
              {showAddForm ? 'Cancel Entry —' : 'Deploy New Task +'}
            </button>
          </section>

          {/* 3. TASK DEPLOYMENT FORM: INDUSTRIAL DATA ENTRY */}
{showAddForm && (
  <div className="mb-12 p-10 bg-zinc-50 border border-zinc-200 animate-in fade-in slide-in-from-top-4 duration-300">
    <div className="flex items-center gap-3 mb-8">
      <div className="w-8 h-px bg-[#B22234]"></div>
      <span className="text-zinc-900 font-black text-[10px] uppercase tracking-[0.4em]">New Entry Protocol</span>
    </div>

    <div className="grid grid-cols-1 md:grid-cols-12 gap-8">
      {/* Field: Nomenclature */}
      <div className="md:col-span-5">
        <label className="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400 mb-3 block">Task Nomenclature</label>
        <input 
          className="w-full bg-white border border-zinc-200 p-4 text-[11px] font-black uppercase tracking-widest outline-none focus:border-zinc-900 transition-all placeholder:text-zinc-200"
          placeholder="IDENTIFY OPERATIONAL PARAMETER..."
          value={newTask.name}
          onChange={(e) => setNewTask({...newTask, name: e.target.value.toUpperCase()})}
        />
      </div>

      {/* Field: Department (Industrial Select) */}
      <div className="md:col-span-3">
        <label className="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400 mb-3 block">Departmental Assignment</label>
        <div className="relative group">
          <select 
            className="w-full bg-white border border-zinc-200 p-4 text-[10px] font-black uppercase tracking-widest outline-none appearance-none cursor-pointer group-hover:border-zinc-900 transition-all"
            value={newTask.dept}
            onChange={(e) => setNewTask({...newTask, dept: e.target.value})}
          >
            <option value="Engineering">Engineering</option>
            <option value="Finance">Finance</option>
            <option value="Admin & Ops">Admin & Ops</option>
            <option value="Public Relations">Public Relations</option>
          </select>
          <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-400">
            <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" /></svg>
          </div>
        </div>
      </div>

      {/* Field: Deadline */}
      <div className="md:col-span-2">
        <label className="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-400 mb-3 block">Registry Deadline</label>
        <input 
          type="date"
          className="w-full bg-white border border-zinc-200 p-3.5 text-[10px] font-black uppercase outline-none focus:border-zinc-900 transition-all"
          value={newTask.date}
          onChange={(e) => setNewTask({...newTask, date: e.target.value})}
        />
      </div>

      {/* Field: Execution Button */}
      <div className="md:col-span-2 flex items-end">
        <button 
          onClick={handleAddTask}
          className="w-full bg-[#B22234] text-white py-4 text-[11px] font-black uppercase tracking-[0.3em] hover:bg-zinc-900 transition-all shadow-lg active:scale-[0.98]"
        >
          Commit Task
        </button>
      </div>
    </div>
  </div>
)}

          {/* CIDC INDUSTRIAL METRICS STRIP - BORDER-Y ARCHITECTURE */}
<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-0 border-y border-zinc-200 mb-20 bg-white">
  {[
    { 
      label: "Active Tasks", 
      val: tasks.length, 
      sub: "Operational Registry" 
    },
    { 
      label: "Pending", 
      val: tasks.filter(t => t.status === 'Pending').length, 
      sub: "Critical Backlog" 
    },
    { 
      label: "In Progress", 
      val: tasks.filter(t => t.status === 'In Progress').length, 
      sub: "Current Execution" 
    },
    { 
      label: "Completed", 
      val: tasks.filter(t => t.status === 'Completed').length, 
      sub: "Archived Assets" 
    },
  ].map((stat, i) => (
    <div 
      key={i} 
      className="p-12 flex flex-col items-center justify-center text-center border-r border-zinc-100 last:border-r-0 md:border-b-0 border-b group hover:bg-zinc-50 transition-all duration-500 h-64"
    >
      {/* Sub-label: Ultra-thin tracking (Statutory Style) */}
      <span className="text-[9px] font-black text-zinc-400 uppercase tracking-[0.4em] mb-6 group-hover:text-[#B22234] transition-colors">
        {stat.sub}
      </span>
      
      {/* Value: Large Industrial Manrope (Heavy Weight) */}
      <h3 className="text-6xl font-black text-zinc-900 tracking-tighter mb-4">
        {stat.val}
      </h3>
      
      {/* Label: Bold and Balanced */}
      <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest leading-none mb-6">
        {stat.label}
      </p>

      {/* CIDC Minimal Accent: Slim 1px line that reacts to hover */}
      <div className="w-8 h-px bg-zinc-200 group-hover:w-16 group-hover:bg-[#B22234] transition-all duration-500"></div>
    </div>
  ))}
</div>

          {/* TASK LEDGER: CIDC INDUSTRIAL TABLE VIEW */}
          <section className="flex flex-col">
            <div className="mb-8">
              <h3 className="text-2xl font-black uppercase tracking-tighter text-zinc-900">Task Management Ledger</h3>
              <p className="text-[10px] font-bold text-red-700 uppercase tracking-[0.2em] mt-2">Current Deployment Registry</p>
            </div>

            {/* TABLE HEADER - BLACK BAR */}
            <div className="grid grid-cols-12  border-t border-zinc-900 p-5 text-zicn-900">
              <div className="col-span-5 text-[9px] font-black uppercase tracking-[0.4em] opacity-50 px-4">Task Nomenclature / ID</div>
              <div className="col-span-2 text-[9px] font-black uppercase tracking-[0.4em] opacity-50">Department</div>
              <div className="col-span-2 text-[9px] font-black uppercase tracking-[0.4em] opacity-50 text-center">Status</div>
              <div className="col-span-1 text-[9px] font-black uppercase tracking-[0.4em] opacity-50 text-center">Deadline</div>
              <div className="col-span-2 text-[9px] font-black uppercase tracking-[0.4em] opacity-50 text-right pr-4">Actions</div>
            </div>

            {/* TABLE BODY */}
            <div className="flex flex-col border-t border-zinc-900">
              {tasks.map((task, i) => (
                <div 
                  key={i} 
                  className="grid grid-cols-12 items-center py-6 border-b border-gray-100 hover:bg-zinc-50 transition-colors group"
                >
                  {/* Name & ID */}
                  <div className="col-span-5 px-6">
                    <span className="text-[13px] font-bold text-zinc-800 group-hover:text-[#B22234] uppercase tracking-tight transition-colors block">
                      {task.name}
                    </span>
                    <span className="text-[8px] font-black text-zinc-300 uppercase tracking-widest mt-1">Ref ID: {task.id}</span>
                  </div>
                  
                  {/* Dept */}
                  <div className="col-span-2">
                    <span className="text-[11px] font-bold text-zinc-500 uppercase tracking-widest">{task.dept}</span>
                  </div>

                  {/* Status */}
                  <div className="col-span-2 flex justify-center">
                    <span className={`text-[8px] font-black uppercase tracking-widest px-3 py-1 border 
                      ${task.status === 'Completed' ? 'text-green-600 border-green-200 bg-green-50' : 
                        task.status === 'In Progress' ? 'text-blue-600 border-blue-200 bg-blue-50' : 
                        'text-zinc-400 border-zinc-200 bg-zinc-50'}`}>
                      {task.status}
                    </span>
                  </div>

                  {/* Deadline */}
                  <div className="col-span-1 text-center">
                    <span className="text-[11px] font-mono text-gray-400">{task.date}</span>
                  </div>

                  {/* Action Icons Dock */}
                  <div className="col-span-2 flex justify-end items-center gap-6 pr-6">
                    {/* View Icon */}
                    <button className="text-zinc-300 hover:text-zinc-900 transition-colors" title="View Details">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                    {/* Edit Icon */}
                    <button className="text-zinc-300 hover:text-blue-600 transition-colors" title="Modify Registry">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                    {/* Delete Icon */}
                    <button onClick={() => purgeTask(task.id)} className="text-zinc-200 hover:text-[#B22234] transition-colors" title="Purge Record">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                  </div>
                </div>
              ))}
            </div>

            {/* Table Footer */}
            <div className="mt-10 flex justify-between items-center opacity-30">
              <p className="text-[8px] font-black uppercase tracking-[0.5em]">Auth Context: CIDC-ADM-04</p>
              <button className="text-[10px] font-black uppercase tracking-widest border-b-2 border-[#B22234] pb-1 hover:text-zinc-900 transition-all">
                Export Full Registry →
              </button>
            </div>
          </section>

        </div>
      </main>
    );
  }

  
 
function Footer (){
  const sectionTitle = "text-white font-bold text-lg mb-6 pb-2 border-b-2 border-[#B22234] inline-block";
  const linkStyle = "text-gray-400 hover:text-[#B22234] transition-colors duration-300 text-sm flex items-center gap-2";

  return (
    <footer className="bg-[#1a1a1a] text-white pt-16 pb-8">
      <div className="max-w-[1500px] mx-auto px-6">
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-12">
          
          <div className="space-y-4">
            <h3 className={sectionTitle}>CIDC Raipur</h3>
            <p className="text-gray-400 text-sm leading-relaxed">
              Chhattisgarh Infrastructure Development Corporation Ltd. is committed to 
              building sustainable and world-class infrastructure for the state of Chhattisgarh.
            </p>
            <div className="pt-4">
              <p className="text-xs text-gray-500 uppercase tracking-widest mb-2">Total Visitors</p>
              <span className="bg-gray-800 px-3 py-1 rounded text-[#B22234] font-mono font-bold tracking-tighter">
                012,458,792
              </span>
            </div>
          </div>

          <div>
            <h3 className={sectionTitle}>Quick Links</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Tenders & RFPs</a></li>
              <li><a href="#" className={linkStyle}>› Latest News</a></li>
              <li><a href="#" className={linkStyle}>› Recruitment</a></li>
              <li><a href="#" className={linkStyle}>› Photo Gallery</a></li>
              <li><a href="#" className={linkStyle}>› Important Documents</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Policy & Help</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Right to Information (RTI)</a></li>
              <li><a href="#" className={linkStyle}>› Terms & Conditions</a></li>
              <li><a href="#" className={linkStyle}>› Privacy Policy</a></li>
              <li><a href="#" className={linkStyle}>› Hyperlinking Policy</a></li>
              <li><a href="#" className={linkStyle}>› Copyright Policy</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Contact Us</h3>
            <div className="text-gray-400 text-sm space-y-4">
              <p>
                <strong>Address:</strong><br />
                First Floor, Shastri Chowk,<br /> 
                Raipur, Chhattisgarh - 492001
              </p>
              <p>
                <strong>Phone:</strong> +91-771-1234567
              </p>
              <p>
                <strong>Email:</strong> info@cidc.cg.gov.in
              </p>
            </div>
          </div>
        </div>

        <hr className="border-gray-800 mb-8" />

        <div className="flex flex-wrap items-center justify-center gap-12 mb-8 opacity-70 grayscale hover:grayscale-0 transition-all">
          <img src="/image/digital-india.png" alt="Digital India" className="h-10 object-contain" />
          <img src="/image/nic-logo.png" alt="National Informatics Centre" className="h-10 object-contain" />
          <img src="/image/mygov-logo.png" alt="MyGov" className="h-10 object-contain" />
          <img src="/image/india-gov-logo.png" alt="India.gov.in" className="h-10 object-contain" />
        </div>

        <div className="text-center space-y-4 pt-8 border-t border-gray-800">
          <p className="text-xs text-gray-500 leading-relaxed">
