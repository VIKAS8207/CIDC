<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Courts | CIDC Raipur Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA]">

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B365D',
                        brandDark: '#0B111D',
                        brandBlue: '#0066FF',
                        accentRed: '#B22234',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    }
                },
            },
        }
    </script>

 <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html"},
        { name: "About Us", href: "about.html" },
        { name: "Schemes", href: "scheme.html" },
        { name: "RTI", href: "rti.html" },
        { name: "Tender", href: "#" },
        { name: "Vendor & Shop", href: "#" },
        { name: "Accounts", href: "#" },
        { name: "To-Do", href: "todo.html" },
        { name: "Contact Us", href: "getin.html" },
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6">
              <div className="flex justify-between items-center mb-8">
                <span className="font-bold text-gray-400">MENU</span>
                <button onClick={() => setIsMenuOpen(false)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              <nav className="flex flex-col space-y-4">
                {navLinks.map((link) => (
                  <a key={link.name} className={`text-lg font-semibold py-2 border-b border-gray-50 ${link.active ? "text-[#B22234]" : "text-gray-800"}`} href={link.href}>{link.name}</a>
                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }

    function NoticesAndAnnouncements() {
  const containerStyle = { maxWidth: '1500px' };

  // Sample data to mimic the screenshot content
  const recentNotices = [
    { id: "NT-2601", date: "Oct 23, 2026", title: "Amendment to Skill Development Certification Process" },
    { id: "NT-2602", date: "Oct 18, 2026", title: "Public Hearing on Urban Expansion Guidelines" },
    { id: "NT-2603", date: "Oct 15, 2026", title: "Vendor Registration Renewal Notice 2026-27" }
  ];

  const circulars = [
    { ref: "CIDC/ORD/2026/09", title: "Administrative Restructuring of Raipur Zonal Office" },
    { ref: "CIDC/TRG/772-B", title: "New Safety Protocols for On-Site Construction Workers" },
    { ref: "CIDC/GEN/2026/13", title: "Holiday Calendar Revision for Q4 2026" }
  ];

  const financialDocs = [
    { title: "Annual Budget Report 2025-26", type: "Financial Transparency" },
    { title: "Audit Statement: CG Raipur Region", type: "Internal Audit" },
    { title: "Proposed Budget Allotment 2027", type: "Strategic Planning" }
  ];

  return (
    <section className="py-24 px-6 bg-white border-t border-zinc-200 font-sans">
      <div style={containerStyle} className="mx-auto">
        
        {/* --- SECTION 1: HEADER & LATEST NOTICE (Top of screenshot) --- */}
        <div className="mb-20">
          <div className="flex items-center gap-4 mb-4">
            <div className="w-12 h-1 bg-[#B22234]"></div>
            <span className="text-[#B22234] font-black text-[10px] uppercase tracking-[0.3em]">Institutional Communications</span>
          </div>
          <h2 className="text-4xl md:text-5xl font-black text-zinc-900 uppercase tracking-tighter">
            Notices & <span className="text-[#B22234]">Announcements</span>
          </h2>
          <p className="text-zinc-500 mt-4 text-sm font-medium italic max-w-xl">
            Official gateway for public notices, executive orders, and institutional circulars.
          </p>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-20 items-stretch">
          
          {/* Main Featured Notice (Manrope + High Contrast) */}
          <div className="lg:col-span-8 bg-zinc-950 p-12 text-white shadow-2xl relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 -mr-16 -mt-16 rotate-45 pointer-events-none"></div>
            
            <div className="flex justify-between items-center mb-10">
              <span className="bg-[#B22234] text-white text-[9px] font-black px-3 py-1 uppercase tracking-widest">High Priority</span>
              <span className="text-zinc-500 text-[10px] font-black uppercase tracking-widest">October 26, 2026</span>
            </div>

            <h3 className="text-3xl font-black uppercase tracking-tighter mb-6 leading-tight max-w-2xl group hover:text-[#B22234] transition-colors cursor-pointer">
              Notice Inviting Tenders for Raipur Infrastructure Development Phase IV
            </h3>
            
            <p className="text-zinc-400 text-sm font-medium leading-relaxed mb-12 max-w-2xl border-l-2 border-white/20 pl-8">
              Official procurement notice for the development of civil infrastructure projects. Interested parties must submit their qualifications by the specified deadline.
            </p>

            <div className="flex justify-between items-center border-t border-white/10 pt-10">
              <button className="bg-[#B22234] text-white px-10 py-4 font-black text-[10px] uppercase tracking-widest hover:bg-white hover:text-zinc-900 transition-all">
                View Full Notice
              </button>
              <span className="text-xs font-bold text-zinc-500 uppercase tracking-wide">Ref: TDR-CIDC-2026-004</span>
            </div>
          </div>

          {/* Right Sidebar Registry */}
          <div className="lg:col-span-4 flex flex-col">
            <h4 className="text-[11px] font-black text-zinc-400 uppercase tracking-[0.3em] mb-6 pl-2">Recent Public Notices</h4>
            <div className="space-y-4 flex-grow">
              {recentNotices.map((notice) => (
                <div key={notice.id} className="bg-zinc-50 p-6 border border-zinc-100 group hover:border-[#B22234] transition-colors cursor-pointer">
                  <div className="flex justify-between items-center mb-3">
                    <span className="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">{notice.date}</span>
                    <span className="text-[9px] font-bold text-zinc-300 uppercase">{notice.id}</span>
                  </div>
                  <p className="text-xs font-bold text-zinc-900 uppercase tracking-tight leading-snug group-hover:text-[#B22234]">
                    {notice.title}
                  </p>
                </div>
              ))}
            </div>
            <button className="mt-8 self-end text-[11px] font-black uppercase tracking-[0.2em] text-[#B22234] border-b-2 border-[#B22234] pb-2 hover:text-zinc-900 transition-colors">
              View Archive →
            </button>
          </div>
        </div>


        {/* --- SECTION 2: ORDERS & CIRCULARS (Monochromatic Grid Style) --- */}
        <div className="mb-20">
          <div className="mb-10">
            <h3 className="text-2xl font-black uppercase tracking-tighter text-zinc-900">Orders & Circulars</h3>
            <div className="h-1 w-12 bg-zinc-900 mt-4"></div>
          </div>

          <div className="border-y border-zinc-900 bg-white">
            {/* Table Header */}
            <div className="hidden md:grid grid-cols-12 gap-0 border-b border-zinc-200 bg-zinc-50">
              <div className="col-span-3 px-8 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400 border-r border-zinc-200">Ref No.</div>
              <div className="col-span-8 px-8 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400 border-r border-zinc-200">Title & Description</div>
              <div className="col-span-1 px-8 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400 text-center">Action</div>
            </div>

            {/* Table Rows */}
            <div className="divide-y divide-zinc-100">
              {circulars.map((circ) => (
                <div key={circ.ref} className="grid grid-cols-1 md:grid-cols-12 gap-0 items-center group hover:bg-zinc-50 transition-colors">
                  <div className="col-span-3 px-8 py-6 border-r border-zinc-100 text-[11px] font-black text-zinc-400 tracking-widest uppercase">
                    {circ.ref}
                  </div>
                  <div className="col-span-8 px-8 py-6 border-r border-zinc-100">
                    <h4 className="font-bold text-zinc-900 uppercase tracking-tight text-sm group-hover:text-[#B22234]">
                      {circ.title}
                    </h4>
                  </div>
                  <div className="col-span-1 flex items-center justify-center p-4">
                    <button className="w-10 h-10 border border-zinc-200 flex items-center justify-center text-zinc-400 hover:bg-zinc-900 hover:text-white transition-all">
                      <span className="text-xs font-black">DL</span>
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>


        {/* --- SECTION 3: ANNOUNCEMENTS & DECLARATIONS (Bottom Checkerboard) --- */}
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0 border border-zinc-200 font-sans">
  
  {/* Institutional Announcements - Left Side (Clean White) */}
  <div className="lg:col-span-7 p-12 lg:p-16 bg-white border-r border-zinc-200">
    <div className="flex items-center gap-4 mb-12">
      <div className="w-10 h-0.5 bg-[#B22234]"></div>
      <h3 className="text-zinc-900 text-2xl font-black uppercase tracking-tighter">
        Institutional <span className="text-[#B22234]">Announcements</span>
      </h3>
    </div>
    
    <div className="space-y-12">
      {[
        { date: "OCTOBER 30, 2026", title: "Inauguration of the New Training Wing", text: "Executive leadership will lead the official inauguration of our advanced technical training facility next Tuesday. Access is restricted to registered invitees." },
        { date: "OCTOBER 28, 2026", title: "Successful Completion of National Skill Survey", text: "CIDC Raipur has finalized the 2026 Construction Workforce Analysis, providing key data for upcoming urban development policy updates." }
      ].map((ann, i) => (
        <div key={i} className="group cursor-pointer relative pl-8 border-l border-zinc-100 hover:border-[#B22234] transition-all duration-500">
          {/* Timeline Dot */}
          <div className="absolute left-[-4.5px] top-0 w-2 h-2 bg-zinc-200 group-hover:bg-[#B22234] transition-all"></div>
          
          <p className="text-[9px] text-zinc-400 uppercase font-black tracking-[0.3em] mb-3">
            {ann.date}
          </p>
          <h4 className="text-sm font-bold text-zinc-900 group-hover:text-[#B22234] uppercase tracking-tight mb-3 transition-colors">
            {ann.title}
          </h4>
          <p className="text-[12px] text-zinc-500 font-medium leading-relaxed max-w-xl">
            {ann.text}
          </p>
          
          {/* Subtle Industrial Link */}
          <div className="mt-4 opacity-0 group-hover:opacity-100 transition-opacity">
            <span className="text-[9px] font-black uppercase tracking-widest text-[#B22234]">Read Full Bulletin +</span>
          </div>
        </div>
      ))}
    </div>
  </div>

  {/* Financial & Budget Declarations - Right Side (Zinc Industrial) */}
  <div className="lg:col-span-5 bg-zinc-50 p-12 lg:p-16 relative flex flex-col justify-between">
    {/* Background Watermark */}
    
    
    <div>
      <div className="flex items-center gap-3 mb-10">
        <span className="text-zinc-900 font-black text-[10px] uppercase tracking-[0.4em]">Section 04</span>
        <div className="h-px bg-zinc-200 flex-grow"></div>
      </div>
      
      <h4 className="text-[11px] font-black mb-10 uppercase tracking-[0.4em] text-zinc-400">
        Financial & Budget Declarations
      </h4>
      
      <div className="space-y-4">
        {financialDocs.map((doc, i) => (
          <div 
            key={i} 
            className="flex justify-between items-center bg-white p-5 border border-zinc-100 group hover:border-zinc-900 transition-all cursor-pointer"
          >
            <div className="flex flex-col">
              <span className="text-[8px] font-black text-zinc-300 uppercase tracking-widest mb-1">{doc.type}</span>
              <span className="text-[11px] font-bold text-zinc-900 group-hover:text-[#B22234] uppercase tracking-tight">
                {doc.title}
              </span>
            </div>
            {/* Industrial Download Icon (Minimalist) */}
            <div className="w-8 h-8 border border-zinc-100 flex items-center justify-center text-zinc-400 group-hover:bg-zinc-900 group-hover:text-white transition-all">
              <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3">
                <path d="M12 5v14m7-7l-7 7-7-7" />
              </svg>
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* CTA - Fixed Bottom in the CIDC style */}
    <div className="mt-12">
      <button className="w-full bg-[#B22234] text-white py-5 font-black text-[11px] uppercase tracking-[0.4em] hover:bg-zinc-900 transition-all duration-300 shadow-xl">
        Request Detailed Financials
      </button>
      <p className="text-[8px] text-zinc-400 text-center mt-4 uppercase tracking-widest font-bold">
        Statutory Disclosures Under RTI Act 2005
      </p>
    </div>
  </div>
</div>
      </div>
    </section>
  );
}


  

function Footer (){
  const sectionTitle = "text-white font-bold text-lg mb-6 pb-2 border-b-2 border-[#B22234] inline-block";
  const linkStyle = "text-gray-400 hover:text-[#B22234] transition-colors duration-300 text-sm flex items-center gap-2";

  return (
    <footer className="bg-[#1a1a1a] text-white pt-16 pb-8">
      <div className="max-w-[1500px] mx-auto px-6">
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-12">
          
          <div className="space-y-4">
            <h3 className={sectionTitle}>CIDC Raipur</h3>
            <p className="text-gray-400 text-sm leading-relaxed">
              Chhattisgarh Infrastructure Development Corporation Ltd. is committed to 
              building sustainable and world-class infrastructure for the state of Chhattisgarh.
            </p>
            <div className="pt-4">
              <p className="text-xs text-gray-500 uppercase tracking-widest mb-2">Total Visitors</p>
              <span className="bg-gray-800 px-3 py-1 rounded text-[#B22234] font-mono font-bold tracking-tighter">
                012,458,792
              </span>
            </div>
          </div>

          <div>
            <h3 className={sectionTitle}>Quick Links</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Tenders & RFPs</a></li>
              <li><a href="#" className={linkStyle}>› Latest News</a></li>
              <li><a href="#" className={linkStyle}>› Recruitment</a></li>
              <li><a href="#" className={linkStyle}>› Photo Gallery</a></li>
              <li><a href="#" className={linkStyle}>› Important Documents</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Policy & Help</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Right to Information (RTI)</a></li>
              <li><a href="#" className={linkStyle}>› Terms & Conditions</a></li>
              <li><a href="#" className={linkStyle}>› Privacy Policy</a></li>
              <li><a href="#" className={linkStyle}>› Hyperlinking Policy</a></li>
              <li><a href="#" className={linkStyle}>› Copyright Policy</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Contact Us</h3>
            <div className="text-gray-400 text-sm space-y-4">
              <p>
                <strong>Address:</strong><br />
                First Floor, Shastri Chowk,<br /> 
                Raipur, Chhattisgarh - 492001
              </p>
              <p>
                <strong>Phone:</strong> +91-771-1234567
              </p>
              <p>
                <strong>Email:</strong> info@cidc.cg.gov.in
              </p>
            </div>
          </div>
        </div>

        <hr className="border-gray-800 mb-8" />

        <div className="flex flex-wrap items-center justify-center gap-12 mb-8 opacity-70 grayscale hover:grayscale-0 transition-all">
          <img src="/image/digital-india.png" alt="Digital India" className="h-10 object-contain" />
          <img src="/image/nic-logo.png" alt="National Informatics Centre" className="h-10 object-contain" />
          <img src="/image/mygov-logo.png" alt="MyGov" className="h-10 object-contain" />
          <img src="/image/india-gov-logo.png" alt="India.gov.in" className="h-10 object-contain" />
        </div>

        <div className="text-center space-y-4 pt-8 border-t border-gray-800">
          <p className="text-xs text-gray-500 leading-relaxed">
            Content Owned by Chhattisgarh Infrastructure Development Corporation Ltd. (CIDC) <br />
            © 2026 CIDC. All rights reserved. 
          </p>
          <p className="text-[10px] text-gray-600 uppercase tracking-widest">
            Developed and Hosted by <span className="text-gray-400">National Informatics Centre (NIC)</span>
          </p>
        </div>

      </div>
    </footer>
  );
};

  function FloatingNotice() {
  return (
    <a 
      href="notice.html" 
      className="fixed bottom-10 right-10 z-[100] flex items-center group font-sans"
    >
      {/* Label: Only visible on hover */}
      <span className=" z-[-1]  bg-[#B22234] text-white text-[12px] font-black uppercase tracking-[0.2em] px-8 py-4 pr-12 -mr-10 opacity-0 group-hover:opacity-100 transition-all duration-300">
        Notice
      </span>

      {/* Circle Button */}
      <div className="w-20 h-20 bg-[#B22234] text-white rounded-full flex items-center justify-center shadow-xl group-hover:bg-zinc-950 transition-colors duration-300">
        <svg 
          className="w-7 h-7" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2.5" 
          viewBox="0 0 24 24"
        >
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
    </a>
  );
}

        function Home() {
            return (
                <div className="antialiased font-sans">
                    <Navbar />
                    <main className="pt-40 min-h-screen px-6">

                       <NoticesAndAnnouncements />
                        <FloatingNotice />
