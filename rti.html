<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Courts | CIDC Raipur Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA]">

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B365D',
                        brandDark: '#0B111D',
                        brandBlue: '#0066FF',
                        accentRed: '#B22234',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    }
                },
            },
        }
    </script>

 <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html"},
        { name: "About Us", href: "about.html" },
        { name: "Account", href: "account.html" },
        { name: "RTI", href: "#" , active: true },
        { name: "Tender", href: "tender.html" },
        { name: "Vendor & Shop", href: "shop.html" },
        { name: "EPFO", href: "EPFO.html" },
        { name: "To-Do", href: "todo.html" },
        { name: "Contact Us", href: "getin.html"},
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="/image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6">
              <div className="flex justify-between items-center mb-8">
                <span className="font-bold text-gray-400">MENU</span>
                <button onClick={() => setIsMenuOpen(false)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              <nav className="flex flex-col space-y-4">
                {navLinks.map((link) => (
                  <a key={link.name} className={`text-lg font-semibold py-2 border-b border-gray-50 ${link.active ? "text-[#B22234]" : "text-gray-800"}`} href={link.href}>{link.name}</a>
                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }

  
    
 function RTIPortal() {
  const containerStyle = { maxWidth: '1500px' };

  const manuals = [
    { title: "Organization & Functions", id: "M01" },
    { title: "Powers of Officers", id: "M02" },
    { title: "Rules & Regulations", id: "M03" },
    { title: "Employee Directory", id: "M04" },
    { title: "Monthly Remuneration", id: "M05" },
    { title: "Budget Allocated", id: "M06" },
    { title: "Subsidy Programs", id: "M07" },
    { title: "Contact of CPIO/PIO", id: "M08" }
  ];

  return (
    <main id="main-content" className="flex-1 w-full py-24 bg-white font-sans">
      
      {/* 1. PRIMARY APPLICATION BLOCK (FULL UPPER SECTION) */}
      <section style={containerStyle} className="mx-auto px-6 mb-20">
        <div className="bg-[#B22234] p-12 lg:p-20 flex flex-col md:flex-row justify-between items-center gap-12 relative overflow-hidden">
          {/* Background Technical Watermark */}
          <div className="absolute left-0 bottom-0 opacity-10 pointer-events-none">
            <svg className="w-96 h-96 -translate-x-24 translate-y-24" fill="none" stroke="white" strokeWidth="1" viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
          </div>

          <div className="relative z-10 max-w-2xl text-center md:text-left">
            <div className="flex items-center justify-center md:justify-start gap-4 mb-6">
              <div className="w-12 h-px bg-white/40"></div>
              <span className="text-white/80 font-black text-[10px] uppercase tracking-[0.4em]">Section 6(1) Protocol</span>
            </div>
            <h1 className="text-5xl md:text-6xl font-black text-white uppercase tracking-tighter leading-none mb-8">
              Apply for <br /> <span className="text-zinc-900">RTI Disclosure</span>
            </h1>
            <p className="text-white/70 text-sm font-medium leading-relaxed max-w-md mx-auto md:mx-0">
              Submit a formal request for information to the Central Public Information Officer. Digital processing ensures statutory compliance within 30 days.
            </p>
          </div>

          <div className="relative z-10 shrink-0">
            <a 
              href="https://rtionline.gov.in" 
              className="inline-block bg-white text-[#B22234] px-16 py-6 font-black text-[12px] uppercase tracking-[0.3em] hover:bg-zinc-900 hover:text-white transition-all shadow-xl border-4 border-transparent hover:border-white/10"
            >
              Start Application 
            </a>
          </div>
        </div>

      </section>

     <section style={containerStyle} className="mx-auto px-6 mb-32 font-sans">

  {/* 1. SEARCH HUB - LEFT ALIGNED RECTANGULAR TERMINAL */}
  <div className="mt-20 pb-16 border-b border-zinc-100">
    <div className="max-w-xl">
      {/* Label Hierarchy */}
      <div className="flex items-center gap-3 mb-4">
        <div className="w-8 h-px bg-[#B22234]"></div>
        <span className="text-[#B22234] font-black text-[10px] uppercase tracking-[0.4em]">Query Terminal</span>
      </div>
      
      <h3 className="text-2xl font-black text-zinc-900 uppercase tracking-tighter mb-6">
        Search Statutory <span className="text-[#B22234]">Manuals</span>
      </h3>

      {/* Rectangular Search Input with Mild Grey Border */}
      <div className="relative flex shadow-sm group">
        <input 
          type="text" 
          placeholder="ENTER KEYWORDS (e.g. BUDGET, EMPLOYEES)..." 
          className="w-full px-6 py-5 border border-zinc-200 bg-zinc-50 text-[11px] font-bold tracking-[0.1em] uppercase focus:bg-white focus:border-zinc-900 outline-none transition-all placeholder:text-zinc-300"
        />
        <button className="bg-zinc-900 text-white px-10 py-5 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-[#B22234] transition-all">
          Execute 
        </button>
      </div>
      
      <p className="mt-4 text-[9px] font-black text-zinc-400 uppercase tracking-widest opacity-60">
        Accessing 17 mandatory categories under Section 4(1)(b)
      </p>
    </div>
  </div>

  {/* 2. SECTION DIVIDER */}
  <div className="flex items-center gap-6 py-12">
    <h4 className="text-xl font-black text-zinc-900 uppercase tracking-tighter shrink-0">
      Statutory <span className="text-[#B22234]">Registry</span>
    </h4>
    <div className="h-px flex-grow bg-zinc-100"></div>
  </div>
  
  {/* 3. WRAPPED DISCLOSURE GRID - MILD GREY BORDERS */}
  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-0 border-t border-l border-zinc-200">
    {manuals.map((manual, i) => (
      <div 
        key={i} 
        className="p-6 border-r border-b border-zinc-200 bg-white flex items-center justify-between group cursor-pointer hover:bg-zinc-50 transition-all duration-300"
      >
        {/* Left Content Wrap */}
        <div className="flex flex-col gap-1 pr-4">
          <span className="text-[8px] font-black text-zinc-400 uppercase tracking-widest leading-none">
            {manual.id || `REF-0${i + 1}`}
          </span>
          <h4 className="text-[11px] font-bold text-zinc-900 uppercase tracking-tight group-hover:text-[#B22234] transition-colors leading-tight">
            {manual.title}
          </h4>
        </div>

        {/* Right Action Dock (Minimalist Square) */}
        <div className="w-10 h-10 shrink-0 flex flex-col items-center justify-center border border-zinc-100 bg-zinc-50 text-zinc-400 group-hover:bg-zinc-900 group-hover:border-zinc-900 group-hover:text-white transition-all">
          <span className="text-[7px] font-black leading-none mb-0.5">PDF</span>
          <svg className="w-2.5 h-2.5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
            <path d="M12 5v14m7-7l-7 7-7-7" />
          </svg>
        </div>
      </div>
    ))}
  </div>

</section>

     {/* 4. ACTION MONOLITH - 1500PX BORDERLESS ARCHITECTURE */}
<section className="w-full bg-white font-sans overflow-hidden py-2">
  <div style={{ maxWidth: '1500px' }} className="mx-auto px-6">
    
    {/* Section Header: Subtle Marker */}
    <div className="flex items-center gap-4 mb-12">
      <div className="w-12 h-px bg-[#B22234]"></div>
      <span className="text-zinc-400 font-black text-[10px] uppercase tracking-[0.4em]">Operational Phases</span>
    </div>

    <div className="grid grid-cols-1 md:grid-cols-3 gap-0">
      
      {/* 01. TRACK STATUS - TONAL ZINC */}
      <div className="p-16 bg-zinc-50 flex flex-col justify-between h-[500px] relative group overflow-hidden transition-all duration-700">
        {/* Ghost Number Watermark */}
        <span className="absolute -top-10 -left-10 text-[200px] font-black text-zinc-100 group-hover:text-[#B22234]/5 transition-colors pointer-events-none leading-none">01</span>
        
        <div className="relative z-10">
        
          <h3 className="font-black text-4xl text-zinc-900 uppercase tracking-tighter mb-8 leading-[0.9]">
            Track <br /> <span className="text-[#B22234]">Status</span>
          </h3>
          <p className="text-[15px] text-zinc-500 font-medium leading-relaxed max-w-xs">
            Verify the current stage of your filed disclosure request via the National Gateway Terminal.
          </p>
        </div>

        <div className="relative z-10 flex bg-white border border-zinc-200 group-hover:border-zinc-900 transition-all p-1">
          <input 
            type="text" 
            placeholder="REGISTRATION NO." 
            className="flex-1 px-6 py-5 text-[11px] font-black outline-none uppercase placeholder:text-zinc-200 bg-transparent" 
          />
          <button className="bg-zinc-900 text-white px-10 py-5 text-[11px] font-black uppercase tracking-[0.2em] hover:bg-[#B22234] transition-all">
            Execute
          </button>
        </div>
      </div>

      {/* 02. FILING PROTOCOL - PURE WHITE */}
      <div className="p-16 bg-white flex flex-col justify-between h-[500px] relative group overflow-hidden transition-all duration-700 border-x border-zinc-50">
        <span className="absolute -top-10 -left-10 text-[200px] font-black text-zinc-50 group-hover:text-zinc-100 transition-colors pointer-events-none leading-none">02</span>
        
        <div className="relative z-10">
        
          <h3 className="font-black text-4xl text-zinc-900 uppercase tracking-tighter mb-8 leading-[0.9]">
            Filing <br /> Protocol
          </h3>
          <p className="text-[15px] text-zinc-500 font-medium leading-relaxed max-w-xs">
            Comprehensive guidelines for physical correspondence, institutional seals, and processing fees.
          </p>
        </div>

        <div className="relative z-10">
          <button className="flex items-center gap-4 group/btn">
            <div className="w-12 h-12 bg-zinc-900 flex items-center justify-center text-white transition-all group-hover/btn:bg-[#B22234]">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M12 5v14m7-7l-7 7-7-7" /></svg>
            </div>
            <span className="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-900 border-b-2 border-transparent group-hover/btn:border-[#B22234] transition-all">
              Download Manual
            </span>
          </button>
        </div>
      </div>

      {/* 03. APPEAL AUTHORITY - CIDC MADDER RED */}
      <div className="p-16 bg-[#B22234] text-white flex flex-col justify-between h-[500px] relative overflow-hidden group">
        {/* Institutional Pattern */}
        <div className="absolute right-0 bottom-0 w-80 h-80 bg-zinc-950/10 -mr-32 -mb-32 rotate-12 pointer-events-none opacity-50 group-hover: transition-transform duration-1000"></div>
        
        <div className="relative z-10">
         
          <h3 className="font-black text-4xl text-white uppercase tracking-tighter mb-8 leading-[0.9]">
            Appeal <br /> <span className="text-zinc-900">Authority</span>
          </h3>
          <p className="text-[15px] text-white/70 font-medium leading-relaxed max-w-xs">
            Lodge a formal first appeal within 30 days if information is withheld or response is unsatisfactory.
          </p>
        </div>

        <button className="relative z-10 w-full py-6 bg-white text-[#B22234] font-black text-[12px] uppercase tracking-[0.4em] hover:bg-zinc-900 hover:text-white transition-all duration-500">
          Lodge First Appeal 
        </button>
      </div>

    </div>
    
  </div>
</section>
    </main>
  );
}

 

function Footer (){
  const sectionTitle = "text-white font-bold text-lg mb-6 pb-2 border-b-2 border-[#B22234] inline-block";
  const linkStyle = "text-gray-400 hover:text-[#B22234] transition-colors duration-300 text-sm flex items-center gap-2";

  return (
    <footer className="bg-[#1a1a1a] text-white pt-16 pb-8">
      <div className="max-w-[1500px] mx-auto px-6">
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-12">
          
          <div className="space-y-4">
            <h3 className={sectionTitle}>CIDC Raipur</h3>
            <p className="text-gray-400 text-sm leading-relaxed">
              Chhattisgarh Infrastructure Development Corporation Ltd. is committed to 
              building sustainable and world-class infrastructure for the state of Chhattisgarh.
            </p>
            <div className="pt-4">
              <p className="text-xs text-gray-500 uppercase tracking-widest mb-2">Total Visitors</p>
              <span className="bg-gray-800 px-3 py-1 rounded text-[#B22234] font-mono font-bold tracking-tighter">
                012,458,792
              </span>
            </div>
          </div>

          <div>
            <h3 className={sectionTitle}>Quick Links</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Tenders & RFPs</a></li>
              <li><a href="#" className={linkStyle}>› Latest News</a></li>
              <li><a href="#" className={linkStyle}>› Recruitment</a></li>
              <li><a href="#" className={linkStyle}>› Photo Gallery</a></li>
              <li><a href="#" className={linkStyle}>› Important Documents</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Policy & Help</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Right to Information (RTI)</a></li>
              <li><a href="#" className={linkStyle}>› Terms & Conditions</a></li>
              <li><a href="#" className={linkStyle}>› Privacy Policy</a></li>
              <li><a href="#" className={linkStyle}>› Hyperlinking Policy</a></li>
              <li><a href="#" className={linkStyle}>› Copyright Policy</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Contact Us</h3>
            <div className="text-gray-400 text-sm space-y-4">
              <p>
                <strong>Address:</strong><br />
                First Floor, Shastri Chowk,<br /> 
                Raipur, Chhattisgarh - 492001
              </p>
              <p>
                <strong>Phone:</strong> +91-771-1234567
              </p>
              <p>
                <strong>Email:</strong> info@cidc.cg.gov.in
              </p>
            </div>
          </div>
        </div>

        <hr className="border-gray-800 mb-8" />

        <div className="flex flex-wrap items-center justify-center gap-12 mb-8 opacity-70 grayscale hover:grayscale-0 transition-all">
          <img src="/image/digital-india.png" alt="Digital India" className="h-10 object-contain" />
          <img src="/image/nic-logo.png" alt="National Informatics Centre" className="h-10 object-contain" />
          <img src="/image/mygov-logo.png" alt="MyGov" className="h-10 object-contain" />
          <img src="/image/india-gov-logo.png" alt="India.gov.in" className="h-10 object-contain" />
        </div>

        <div className="text-center space-y-4 pt-8 border-t border-gray-800">
          <p className="text-xs text-gray-500 leading-relaxed">
            Content Owned by Chhattisgarh Infrastructure Development Corporation Ltd. (CIDC) <br />
            © 2026 CIDC. All rights reserved. 
          </p>
          <p className="text-[10px] text-gray-600 uppercase tracking-widest">
            Developed and Hosted by <span className="text-gray-400">National Informatics Centre (NIC)</span>
          </p>
        </div>

      </div>
    </footer>
  );
};



function RTIContactRegistry() {
  const containerStyle = { maxWidth: '1500px' };

  const officers = [
    {
      role: "Public Relation Officer (PRO)",
      authority: "RTI Information Wing",
      name: "Shri. Alok Vardhan",
      contact: "+91-771-2234567",
      email: "pro.rti@cidc.cg.gov.in",
      accent: "bg-[#B22234]" // Madder Red for Primary Point of Contact
    },
    {
      role: "First Appellate Authority",
      authority: "Statutory Appeals Division",
      name: "Smt. Rashmi Singh",
      contact: "+91-771-2234588",
      email: "faa.rti@cidc.cg.gov.in",
      accent: "bg-zinc-900" // Zinc-900 for Appellate Authority
    }
  ];

  return (
    <section className="py-20 bg-white font-sans antialiased">
      <div style={containerStyle} className="mx-auto px-8">
        
        {/* SECTION HEADER: REGULATORY CONTEXT */}
        <div className="mb-12 border-b-2 border-zinc-900 pb-8">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-10 h-1 bg-[#B22234]"></div>
            <span className="text-[#B22234] font-black text-[10px] uppercase tracking-[0.5em]">Section 4(1)(b) Compliance</span>
          </div>
          <h2 className="text-4xl font-black text-zinc-900 uppercase tracking-tighter leading-none">
            RTI Statutory <span className="text-[#B22234]">Contacts</span>
          </h2>
        </div>

        {/* DUAL-COLUMN CONTACT MONOLITH */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-0 border border-zinc-200">
          {officers.map((officer, i) => (
            <div 
              key={i} 
              className={`p-12 flex flex-col justify-between h-[400px] transition-all duration-500 hover:bg-zinc-50 group
                ${i === 0 ? 'border-r border-zinc-200' : 'border-l-4 border-l-[#B22234]'}`}
            >
              {/* Top: Role & Authority */}
              <div>
                <div className="flex items-center gap-4 mb-6">
                  <div className={`w-3 h-3 ${officer.accent} shrink-0`}></div>
                  <span className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400 group-hover:text-zinc-900 transition-colors">
                    {officer.authority}
                  </span>
                </div>
                <h3 className="text-3xl font-black text-zinc-900 uppercase tracking-tighter leading-tight mb-4">
                  {officer.role}
                </h3>
              </div>

              {/* Bottom: Credentials */}
              <div className="space-y-6">
                <div>
                  <span className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-400 block mb-1">Official Name</span>
                  <p className="text-xl font-black text-zinc-900 uppercase tracking-tight group-hover:text-[#B22234] transition-colors">
                    {officer.name}
                  </p>
                </div>
                
                <div className="grid grid-cols-2 gap-8 pt-6 border-t border-zinc-100">
                  <div>
                    <span className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-400 block mb-1">Contact Line</span>
                    <p className="text-[13px] font-bold font-mono text-zinc-800">{officer.contact}</p>
                  </div>
                  <div>
                    <span className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-400 block mb-1">Direct Email</span>
                    <p className="text-[11px] font-bold text-zinc-500 break-all uppercase tracking-tighter">{officer.email}</p>
                  </div>
                </div>
              </div>

              {/* Interaction Label */}
              <div className="mt-8 opacity-0 group-hover:opacity-100 transition-opacity">
                <button className="text-[10px] font-black uppercase tracking-widest border-b-2 border-[#B22234] pb-1 hover:text-[#B22234]">
                  Initiate Correspondence 
                </button>
              </div>
            </div>
          ))}
        </div>

        {/* STATUTORY FOOTER NOTE */}
        <div className="mt-8 flex items-center justify-between opacity-40">
          <p className="text-[8px] font-black uppercase tracking-[0.5em]">Registry ID: CIDC-RTI-2026-V1</p>
          <div className="flex gap-4">
            <div className="w-2 h-2 bg-zinc-900"></div>
            <div className="w-2 h-2 bg-[#B22234]"></div>
          </div>
        </div>
      </div>
    </section>
  );
};



  function FloatingNotice() {
  return (
    <a 
      href="notice.html" 
      className="fixed bottom-10 right-10 z-[100] flex items-center group font-sans"
    >
      {/* Label: Only visible on hover */}
      <span className=" z-[-1]  bg-[#B22234] text-white text-[12px] font-black uppercase tracking-[0.2em] px-8 py-4 pr-12 -mr-10 opacity-0 group-hover:opacity-100 transition-all duration-300">
        Notice
      </span>

      {/* Circle Button */}
      <div className="w-20 h-20 bg-[#B22234] text-white rounded-full flex items-center justify-center shadow-xl group-hover:bg-zinc-950 transition-colors duration-300">
        <svg 
          className="w-7 h-7" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2.5" 
          viewBox="0 0 24 24"
        >
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
    </a>
  );
}


        function Home() {
            return (
                <div className="antialiased font-sans">
                    <Navbar />
                    <main className="pt-40 min-h-screen px-6">
<RTIPortal />
<RTIContactRegistry />
<FloatingNotice />


                    </main>
                    <Footer />
                </div>
            );
        }

        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<Home />);
    </script>
</body>
