<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Courts | CIDC Raipur Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA]">

    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B365D',
                        brandDark: '#0B111D',
                        brandBlue: '#0066FF',
                        accentRed: '#B22234',
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                    }
                },
            },
        }
    </script>

 <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const IndianFlag = ({ width = "w-6", height = "h-4" }) => (
      <svg viewBox="0 0 512 341" className={`${width} ${height} rounded-sm shadow-sm`} xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="113.7" fill="#ff9933"/>
        <rect y="113.7" width="512" height="113.7" fill="#ffffff"/>
        <rect y="227.4" width="512" height="113.7" fill="#128807"/>
        <g transform="translate(256 170.5)">
          <circle r="50" fill="none" stroke="#000080" strokeWidth="4"/>
          <circle r="8" fill="#000080"/>
          {[...Array(24)].map((_, i) => (
            <line key={i} y2="50" transform={`rotate(${i * 15})`} stroke="#000080" strokeWidth="2" />
          ))}
        </g>
      </svg>
    );

    function Navbar() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const handleScroll = useCallback(() => {
        setIsScrolled(window.scrollY > 50);
      }, []);

      useEffect(() => {
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [handleScroll]);

      const navLinks = [
        { name: "Home", href: "index.html"},
        { name: "About Us", href: "about.html" },
        { name: "Account", href: "account.html" },
        { name: "RTI", href: "#" },
        { name: "Tender", href: "#" },
        { name: "Vendor & Shop", href: "#" },
        { name: "EPFO", href: "EPFO.html" },
        { name: "To-Do", href: "#" },
        { name: "Contact Us", href: "getin.html", active: true  },
      ];

      return (
        <header className="fixed top-0 z-50 w-full transition-all duration-300">
          {/* Top Black Bar */}
          <div className={`bg-black text-white transition-all duration-300 overflow-hidden ${isScrolled ? 'h-0 opacity-0' : 'h-12 opacity-100 border-b border-white/10'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between text-xs tracking-wide">
              <div className="flex items-center gap-3">
                <IndianFlag width="w-7" />
                <span className="font-medium uppercase">Government of India</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 border-r border-white/20 pr-6">
                  <button className="hover:text-red-500">-A</button>
                  <button className="bg-white/10 w-6 h-6 flex items-center justify-center rounded">A</button>
                  <button className="hover:text-red-500">A+</button>
                </div>
                <div className="flex items-center gap-3">
                  <button className="font-semibold text-red-500 uppercase">English</button>
                  <span className="text-white/30">|</span>
                  <button className="text-gray-300 hover:text-red-500">हिन्दी</button>
                </div>
              </div>
            </div>
          </div>

          {/* Main White Navbar */}
          <div className={`w-full transition-all duration-300 bg-white border-b border-gray-100 ${isScrolled ? 'shadow-md h-20' : 'h-28'}`}>
            <div className="max-w-[1500px] mx-auto px-6 h-full flex items-center justify-between gap-10">
              <div className="shrink-0 flex items-center gap-5">
                <a href="/" className="shrink-0">
  <img 
    src="/image/CIDClogo.png" 
    alt="Logo" 
    className={`
      object-contain transition-all duration-500 
      /* Mobile/Small sizes */
      ${isScrolled ? 'h-8' : 'h-10'} 
      /* Tablet/Medium sizes (md) */
      ${isScrolled ? 'md:h-9' : 'md:h-12'} 
      /* Desktop sizes (lg) */
      ${isScrolled ? 'lg:h-10' : 'lg:h-14'}
    `} 
  />
</a>
                <div className={`w-px bg-gray-200 transition-all duration-500 ${isScrolled ? 'h-10' : 'h-16'}`}></div>
                <div className="flex flex-col max-w-[200px] md:max-w-[300px] text-gray-900 leading-tight">
  <span className="text-sm md:text-lg font-extrabold uppercase text-gray-500">
    Government of Chhattisgarh
  </span>
  <span className="text-[10px] md:text-[13px] font-semibold text-gray-700">
    Chhattisgarh Infrastructure Development Corporation Ltd.
  </span>
</div>
              </div>

              {/* Desktop Nav */}
              <nav className="hidden xl:flex items-center space-x-9 text-[15px] font-semibold text-gray-800">
                {navLinks.map((link) => (
                  <a key={link.name} className={link.active ? "text-[#B22234]" : "hover:text-[#B22234] transition-colors"} href={link.href}>{link.name}</a>
                ))}
              </nav>

              {/* Mobile Toggle */}
              <button className="xl:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
              </button>
            </div>
          </div>

          {/* Sidebar Overlay */}
          <div className={`fixed inset-0 bg-black/50 transition-opacity duration-300 xl:hidden ${isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`} onClick={() => setIsMenuOpen(false)} />

          {/* Sidebar Panel */}
          <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl transition-transform duration-300 transform xl:hidden z-[60] ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
            <div className="p-6">
              <div className="flex justify-between items-center mb-8">
                <span className="font-bold text-gray-400">MENU</span>
                <button onClick={() => setIsMenuOpen(false)}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
              </div>
              <nav className="flex flex-col space-y-4">
                {navLinks.map((link) => (
                  <a key={link.name} className={`text-lg font-semibold py-2 border-b border-gray-50 ${link.active ? "text-[#B22234]" : "text-gray-800"}`} href={link.href}>{link.name}</a>
                ))}
              </nav>
            </div>
          </div>
        </header>
      );
    }

    
function RentPaymentGateway ()  {
  const [paymentCycle, setPaymentCycle] = useState('Monthly');
  const [selectedYear, setSelectedYear] = useState('2026');
  const [selectedMonth, setSelectedMonth] = useState('April');

  const containerStyle = { maxWidth: '1400px' };

  return (
    <main className="min-h-screen bg-white py-20 font-sans antialiased text-zinc-900">
      <div style={containerStyle} className="mx-auto px-6 space-y-16">
        
        {/* 1. HEADER: BILLING AUTHORITY */}
        <section className="max-w-3xl">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-10 h-1 bg-[#B22234]"></div>
            <span className="text-[#B22234] font-black text-[10px] uppercase tracking-[0.4em]">Estate Billing Terminal</span>
          </div>
          <h1 className="text-6xl font-black uppercase tracking-tighter leading-none mb-6">
            Rent <span className="text-[#B22234]">Payment Gateway</span>
          </h1>
          <p className="text-zinc-500 text-sm font-medium leading-relaxed border-l-4 border-zinc-900 pl-8">
            Configure your commercial allotment payment cycle. Select the specific tenure parameters 
            below to calculate statutory dues for the CIDC Raipur commercial zone.
          </p>
        </section>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0 border border-zinc-200">
          
          {/* LEFT: CONFIGURATION ENGINE */}
          <div className="lg:col-span-8 p-12 space-y-12 bg-white">
            <div className="flex items-center gap-4 pb-6 border-b border-zinc-100">
              <div className="w-12 h-12 bg-zinc-900 flex items-center justify-center text-white">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
              </div>
              <h3 className="text-2xl font-black uppercase tracking-tighter">Payment Configuration</h3>
            </div>

            {/* A. CYCLE SELECTION */}
            <div className="space-y-6">
              <span className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400">01. Select Payment Cycle</span>
              <div className="grid grid-cols-3 gap-4">
                {['Monthly', 'Quarterly', 'Yearly'].map((cycle) => (
                  <button 
                    key={cycle}
                    onClick={() => setPaymentCycle(cycle)}
                    className={`py-6 border-2 font-black text-[11px] uppercase tracking-widest transition-all
                      ${paymentCycle === cycle ? 'bg-zinc-900 text-white border-zinc-900' : 'bg-white text-zinc-400 border-zinc-100 hover:border-zinc-900'}`}
                  >
                    {cycle}
                  </button>
                ))}
              </div>
            </div>

            {/* B. TENURE SELECTION (MONTH & YEAR) */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 pt-8 border-t border-zinc-100">
              <div className="space-y-6">
                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400">02. Select Financial Year</span>
                <select 
                  value={selectedYear}
                  onChange={(e) => setSelectedYear(e.target.value)}
                  className="w-full bg-zinc-50 border-2 border-zinc-200 p-5 text-[12px] font-black uppercase tracking-widest outline-none focus:border-[#B22234] appearance-none cursor-pointer"
                >
                  <option>2024</option>
                  <option>2025</option>
                  <option>2026</option>
                </select>
              </div>

              <div className="space-y-6">
                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-400">03. Select Specific Month</span>
                <select 
                  value={selectedMonth}
                  onChange={(e) => setSelectedMonth(e.target.value)}
                  className="w-full bg-zinc-50 border-2 border-zinc-200 p-5 text-[12px] font-black uppercase tracking-widest outline-none focus:border-[#B22234] appearance-none cursor-pointer"
                >
                  {['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'].map(m => (
                    <option key={m}>{m}</option>
                  ))}
                </select>
              </div>
            </div>
          </div>

          {/* RIGHT: SETTLEMENT SUMMARY MONOLITH */}
          <div className="lg:col-span-4 bg-zinc-50 border-l border-zinc-200 p-12 flex flex-col justify-between relative overflow-hidden">
            <div className="absolute -right-12 -bottom-12 opacity-[0.03] pointer-events-none">
              <svg className="w-64 h-64 rotate-12" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z" /><path fillRule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clipRule="evenodd" /></svg>
            </div>

            <div className="relative z-10">
              <div className="flex justify-between items-center mb-10 pb-4 border-b border-zinc-200">
                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-400">Settlement Invoice</span>
                <div className="w-2 h-2 bg-[#B22234]"></div>
              </div>

              <div className="space-y-6">
                <div className="flex justify-between text-[11px] font-bold uppercase tracking-widest text-zinc-500">
                  <span>Base Allotment Rent</span>
                  <span className="text-zinc-900">₹ 4,500.00</span>
                </div>
                <div className="flex justify-between text-[11px] font-bold uppercase tracking-widest text-zinc-500">
                  <span>Cycle Adjustment</span>
                  <span className="text-zinc-900">1.00x</span>
                </div>
                <div className="flex justify-between text-[11px] font-bold uppercase tracking-widest text-zinc-500">
                  <span>Tenure Selected</span>
                  <span className="text-zinc-900">{selectedMonth} {selectedYear}</span>
                </div>
              </div>

              <div className="mt-12 py-10 border-y-2 border-zinc-900 bg-white px-4">
                <span className="text-[9px] font-black uppercase tracking-[0.5em] text-zinc-400 block mb-2">Statutory Amount Due</span>
                <div className="flex items-baseline gap-1">
                  <span className="text-5xl font-black text-[#B22234] tracking-tighter leading-none">₹ 4,500</span>
                  <span className="text-xl font-black text-[#B22234] opacity-50">.00</span>
                </div>
              </div>
            </div>

            <div className="relative z-10 pt-10">
              <button className="w-full bg-[#B22234] text-white py-6 font-black text-[12px] uppercase tracking-[0.4em] hover:bg-zinc-950 transition-all flex items-center justify-center gap-4 group shadow-xl">
                Pay Securely Now
                <svg className="w-5 h-5 transition-transform group-hover:translate-x-2" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
              </button>
              
              <p className="mt-6 text-[9px] font-bold text-zinc-400 uppercase tracking-widest text-center leading-relaxed">
                Payment covers only the selected tenure period. <br/> Transaction secured by CIDC Multi-layer Encryption.
              </p>
            </div>
          </div>
        </div>

        {/* ASSISTANCE FOOTER */}
        <div className="bg-zinc-900 p-10 flex flex-col md:flex-row justify-between items-center gap-8 border-l-8 border-[#B22234]">
          <div className="flex items-center gap-6">
            <div className="w-12 h-12 bg-white/10 flex items-center justify-center border border-white/20">
               <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            </div>
            <div>
              <h4 className="text-white text-[13px] font-black uppercase tracking-tight">Billing Assistance</h4>
              <p className="text-white/40 text-[10px] font-bold uppercase tracking-widest">Contact our estate management desk for discrepancies.</p>
            </div>
          </div>
          <button className="px-10 py-4 border border-white/20 text-white text-[10px] font-black uppercase tracking-[0.3em] hover:bg-white hover:text-zinc-900 transition-all">
            Open Support Ticket —
          </button>
        </div>

      </div>
    </main>
  );
};





  


function Footer (){
  const sectionTitle = "text-white font-bold text-lg mb-6 pb-2 border-b-2 border-[#B22234] inline-block";
  const linkStyle = "text-gray-400 hover:text-[#B22234] transition-colors duration-300 text-sm flex items-center gap-2";

  return (
    <footer className="bg-[#1a1a1a] text-white pt-16 pb-8">
      <div className="max-w-[1500px] mx-auto px-6">
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-12">
          
          <div className="space-y-4">
            <h3 className={sectionTitle}>CIDC Raipur</h3>
            <p className="text-gray-400 text-sm leading-relaxed">
              Chhattisgarh Infrastructure Development Corporation Ltd. is committed to 
              building sustainable and world-class infrastructure for the state of Chhattisgarh.
            </p>
            <div className="pt-4">
              <p className="text-xs text-gray-500 uppercase tracking-widest mb-2">Total Visitors</p>
              <span className="bg-gray-800 px-3 py-1 rounded text-[#B22234] font-mono font-bold tracking-tighter">
                012,458,792
              </span>
            </div>
          </div>

          <div>
            <h3 className={sectionTitle}>Quick Links</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Tenders & RFPs</a></li>
              <li><a href="#" className={linkStyle}>› Latest News</a></li>
              <li><a href="#" className={linkStyle}>› Recruitment</a></li>
              <li><a href="#" className={linkStyle}>› Photo Gallery</a></li>
              <li><a href="#" className={linkStyle}>› Important Documents</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Policy & Help</h3>
            <ul className="space-y-3">
              <li><a href="#" className={linkStyle}>› Right to Information (RTI)</a></li>
              <li><a href="#" className={linkStyle}>› Terms & Conditions</a></li>
              <li><a href="#" className={linkStyle}>› Privacy Policy</a></li>
              <li><a href="#" className={linkStyle}>› Hyperlinking Policy</a></li>
              <li><a href="#" className={linkStyle}>› Copyright Policy</a></li>
            </ul>
          </div>

          <div>
            <h3 className={sectionTitle}>Contact Us</h3>
            <div className="text-gray-400 text-sm space-y-4">
              <p>
                <strong>Address:</strong><br />
                First Floor, Shastri Chowk,<br /> 
                Raipur, Chhattisgarh - 492001
              </p>
              <p>
                <strong>Phone:</strong> +91-771-1234567
              </p>
              <p>
                <strong>Email:</strong> info@cidc.cg.gov.in
              </p>
            </div>
          </div>
        </div>

        <hr className="border-gray-800 mb-8" />

        <div className="flex flex-wrap items-center justify-center gap-12 mb-8 opacity-70 grayscale hover:grayscale-0 transition-all">
          <img src="/image/digital-india.png" alt="Digital India" className="h-10 object-contain" />
          <img src="/image/nic-logo.png" alt="National Informatics Centre" className="h-10 object-contain" />
          <img src="/image/mygov-logo.png" alt="MyGov" className="h-10 object-contain" />
          <img src="/image/india-gov-logo.png" alt="India.gov.in" className="h-10 object-contain" />
        </div>

        <div className="text-center space-y-4 pt-8 border-t border-gray-800">
          <p className="text-xs text-gray-500 leading-relaxed">
            Content Owned by Chhattisgarh Infrastructure Development Corporation Ltd. (CIDC) <br />
            © 2026 CIDC. All rights reserved. 
          </p>
          <p className="text-[10px] text-gray-600 uppercase tracking-widest">
            Developed and Hosted by <span className="text-gray-400">National Informatics Centre (NIC)</span>
          </p>
        </div>

      </div>
    </footer>
  );
};

 


        function Home() {
            return (
                <div className="antialiased font-sans">
                    <Navbar />
                    <main className="pt-40 min-h-screen px-6">
                     <RentPaymentGateway /> 
                    </main>
                    <Footer />
                </div>
            );
        }

        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<Home />);
    </script>
</body>
</html>
